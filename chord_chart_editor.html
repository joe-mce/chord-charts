<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chord Chart Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #1a1a1c;
    --bg3: #242426;
    --border: #2e2e32;
    --border2: #3e3e44;
    --text: #e8e8ea;
    --text2: #888890;
    --text3: #555560;
    --danger: #e05555;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100vh;
    padding: 14px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-bottom: 10px;
  }
  .meta-grid input {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--mono);
    width: 100%;
    outline: none;
  }
  .meta-grid input:focus { border-color: var(--border2); }
  .meta-grid input::placeholder { color: var(--text3); }

  .lines-area {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 8px;
  }

  .line-row {
    display: flex;
    align-items: stretch;
    width: 100%;
    min-width: 0;
  }

  .bars-container {
    display: flex;
    align-items: stretch;
    flex: 1;
    min-width: 0;
  }

  .bar-wrap {
    display: flex;
    align-items: stretch;
    flex: 1;
    min-width: 36px;
    position: relative;
  }

  .bar-sep {
    width: 1px;
    min-width: 1px;
    background: var(--border);
    flex-shrink: 0;
    align-self: stretch;
  }

  .bar-input {
    flex: 1;
    min-width: 0;
    width: 100%;
    background: var(--bg2);
    border-top: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    border-left: none;
    border-right: none;
    padding: 8px 3px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--mono);
    text-align: center;
    outline: none;
    height: 38px;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .bar-input:focus {
    background: var(--bg3);
    border-top-color: var(--border2);
    border-bottom-color: var(--border2);
    z-index: 1;
    position: relative;
  }

  .line-start-border {
    width: 1px;
    min-width: 1px;
    background: var(--border);
    flex-shrink: 0;
    align-self: stretch;
    border-radius: var(--radius) 0 0 var(--radius);
  }

  .line-options-btn {
    flex-shrink: 0;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 0 10px;
    height: 38px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .line-options-btn:hover { color: var(--text); background: var(--bg3); }

  .line-left-border {
    width: 1px;
    background: var(--border);
    flex-shrink: 0;
    align-self: stretch;
  }
  .line-right-border {
    width: 1px;
    background: var(--border);
    flex-shrink: 0;
    align-self: stretch;
  }

  .add-line-btn {
    background: none;
    border: 0.5px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text3);
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    font-family: var(--sans);
    letter-spacing: 0.05em;
    transition: color 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .add-line-btn:hover { color: var(--text2); border-color: var(--border2); }

  .output-section { margin-top: 16px; }

  .output-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 6px;
  }

  .output-wrap {
    position: relative;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 42px 14px 14px;
  }

  .output-pre {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    white-space: pre;
    line-height: 1.75;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 7px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--border2); }

  .menu-overlay {
    position: fixed;
    z-index: 200;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    min-width: 210px;
    overflow: hidden;
  }
  .menu-overlay button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-overlay button:hover { background: var(--bg2); }
  .menu-overlay button.danger { color: var(--danger); }
  .menu-divider { height: 0.5px; background: var(--border); margin: 2px 0; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 9px 20px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--sans);
    opacity: 0;
    transition: opacity 0.16s ease, transform 0.16s ease;
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<h1>Chord Chart Editor</h1>

<div class="meta-grid">
  <input id="m-title" placeholder="Title" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-composer" placeholder="Composer" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-feel" placeholder="Feel" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-key" placeholder="Key" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
</div>

<div class="lines-area" id="lines-area"></div>
<button class="add-line-btn" onclick="addLine()">+ add line</button>

<div class="output-section">
  <div class="output-label">Output</div>
  <div class="output-wrap">
    <pre class="output-pre" id="output"></pre>
    <button class="copy-btn" onclick="copyOutput()" title="Copy">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="menu-portal"></div>

<script>
let lines = [['','','',''],['','','',''],['','','',''],['','','','']];
let menuState = null;
let outputTimer = null;
let toastTimer = null;

const CONVERSIONS = [
  ['maj7','Δ7'],
  ['m7','m7'],
  ['h7','ø7'],
  ['ø7','ø7'],
  ['dim7','o'],
];

function convertSymbols(s) {
  let r = s;
  CONVERSIONS.forEach(([f,t]) => { r = r.split(f).join(t); });
  return r;
}

// Parse user input into { openBar, content, closeBar }
// |: at start means opening repeat, :| at end means closing repeat
function parseBarInput(raw) {
  let s = raw.trim();
  let openBar = '';
  let closeBar = '|';

  if (s.startsWith('|:')) {
    openBar = '|:';
    s = s.slice(2).trim();
  }
  if (s.endsWith(':|')) {
    closeBar = ':|';
    s = s.slice(0, -2).trim();
  }

  return { openBar, content: s, closeBar };
}

// Total bar width is always 9 chars: openBar + content + closeBar
// openBar: '' = 0 chars, '|:' = 2 chars
// closeBar: '|' = 1 char, ':|' = 2 chars
// contentWidth = 9 - openBar.length - closeBar.length
// Exception: if chords cannot fit with min 1 space between them, allow wider content

function layoutContent(raw, contentWidth) {
  const s = convertSymbols(raw);

  // Empty or repeat symbol — centre the %
  if (!s || s === '%') {
    const side = Math.floor((contentWidth - 1) / 2);
    return ' '.repeat(side) + '%' + ' '.repeat(contentWidth - side - 1);
  }

  // Split on whitespace to get individual chord tokens
  const tokens = s.split(/\s+/).filter(Boolean);

  if (tokens.length === 1) {
    // Single chord: left-align, pad to contentWidth
    return tokens[0].padEnd(contentWidth);
  }

  if (tokens.length === 2) {
    const [c1, c2] = tokens;
    // Second chord target: midpoint of the content field
    const midpoint = Math.floor(contentWidth / 2);
    // Gap must be at least 1 space after c1
    const minPos = c1.length + 1;
    const pos = Math.max(minPos, midpoint);
    if (pos + c2.length <= contentWidth) {
      return c1.padEnd(pos) + c2.padEnd(contentWidth - pos);
    } else {
      // Overflow allowed: single space between chords
      return c1 + ' ' + c2;
    }
  }

  // Three or more chords: join with single space
  const joined = tokens.join(' ');
  if (joined.length <= contentWidth) return joined.padEnd(contentWidth);
  return joined;
}

function formatBarOutput(raw, _isFirst) {
  const { openBar, content, closeBar } = parseBarInput(raw);
  // Total bar = 9 chars; derive contentWidth from what open/close consume
  const openLen = openBar.length;   // 0 or 2
  const closeLen = closeBar.length; // 1 or 2
  const contentWidth = 9 - openLen - closeLen;
  const padded = layoutContent(content, contentWidth);

  if (openBar === '|:') return '|:' + padded + closeBar;
  return padded + closeBar;
}

function buildOutput() {
  const title = document.getElementById('m-title').value.trim();
  const composer = document.getElementById('m-composer').value.trim();
  const feel = document.getElementById('m-feel').value.trim();
  const key = document.getElementById('m-key').value.trim();

  let out = '';
  const titlePart = title;
  const composerPart = composer ? '(' + composer + ')' : '';
  const titleLine = [titlePart, composerPart].filter(Boolean).join(' ');
  const feelLine = [feel, key].filter(Boolean).join(', ');
  if (titleLine) out += titleLine + '\n';
  if (feelLine) out += feelLine + '\n';

  lines.forEach(bars => {
    let lineStr = '';
    bars.forEach((raw, bi) => {
      lineStr += formatBarOutput(raw, bi === 0);
    });
    out += lineStr + '\n';
  });

  document.getElementById('output').textContent = out.trimEnd();
}

function scheduleOutput() {
  clearTimeout(outputTimer);
  outputTimer = setTimeout(buildOutput, 280);
}

function render() {
  const area = document.getElementById('lines-area');
  area.innerHTML = '';

  lines.forEach((bars, li) => {
    const row = document.createElement('div');
    row.className = 'line-row';

    // Left border of the row
    const leftBorder = document.createElement('div');
    leftBorder.style.cssText = 'width:1px;min-width:1px;background:var(--border);flex-shrink:0;align-self:stretch;border-radius:6px 0 0 6px;border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);border-left:0.5px solid var(--border)';

    const barsContainer = document.createElement('div');
    barsContainer.className = 'bars-container';

    bars.forEach((val, bi) => {
      const inp = document.createElement('input');
      inp.className = 'bar-input';
      inp.value = val;
      inp.setAttribute('autocomplete', 'off');
      inp.setAttribute('autocorrect', 'off');
      inp.setAttribute('autocapitalize', 'none');
      inp.setAttribute('spellcheck', 'false');
      inp.addEventListener('input', e => {
        lines[li][bi] = e.target.value;
        scheduleOutput();
      });

      barsContainer.appendChild(inp);

      // Add separator after each bar (acts as barline visual)
      const sep = document.createElement('div');
      sep.className = 'bar-sep';
      barsContainer.appendChild(sep);
    });

    const optBtn = document.createElement('button');
    optBtn.className = 'line-options-btn';
    optBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>`;
    optBtn.addEventListener('click', e => { e.stopPropagation(); showLineMenu(e, li); });

    // Outer border wrapper for the bars + left edge
    const outerWrap = document.createElement('div');
    outerWrap.style.cssText = 'display:flex;align-items:stretch;flex:1;min-width:0;border:0.5px solid var(--border);border-right:none;border-radius:6px 0 0 6px;overflow:hidden';
    outerWrap.appendChild(barsContainer);

    row.appendChild(outerWrap);
    row.appendChild(optBtn);
    area.appendChild(row);
  });

  buildOutput();
}

function showLineMenu(e, li) {
  closeMenu();
  const rect = e.target.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';

  const menuW = 210;
  let left = rect.right - menuW;
  if (left < 8) left = 8;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  m.style.top = (rect.bottom + 6) + 'px';
  m.style.left = left + 'px';

  const actions = [
    ['Add bar', () => { lines[li].push(''); render(); }],
    ['Remove empty bars', () => {
      const filtered = lines[li].filter(b => {
        const { content } = parseBarInput(b);
        return content !== '' && content !== '%';
      });
      lines[li] = filtered.length > 0 ? filtered : [''];
      render();
    }],
    ['—'],
    ['Add line above', () => { lines.splice(li, 0, ['','','','']); render(); }],
    ['Add line below', () => { lines.splice(li + 1, 0, ['','','','']); render(); }],
    ['—'],
    ['Delete line', () => { if (lines.length > 1) { lines.splice(li, 1); render(); } }, 'danger'],
  ];

  actions.forEach(([label, fn, cls]) => {
    if (label === '—') {
      const d = document.createElement('div');
      d.className = 'menu-divider';
      m.appendChild(d);
      return;
    }
    const btn = document.createElement('button');
    btn.textContent = label;
    if (cls) btn.className = cls;
    btn.addEventListener('click', () => { closeMenu(); fn(); });
    m.appendChild(btn);
  });

  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

function closeMenu() {
  if (menuState) { menuState.remove(); menuState = null; }
}

document.addEventListener('click', closeMenu);

function addLine() {
  lines.push(['','','','']);
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    showToast('Copy failed');
  });
}

['m-title','m-composer','m-feel','m-key'].forEach(id => {
  document.getElementById(id).addEventListener('input', scheduleOutput);
});

render();
</script>
</body>
</html>
