<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chord Chart Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #1a1a1c;
    --bg3: #242426;
    --border: #2e2e32;
    --border2: #3e3e44;
    --text: #e8e8ea;
    --text2: #888890;
    --text3: #555560;
    --danger: #e05555;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 6px;
    --left-gutter: 28px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100vh;
    padding: 14px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-bottom: 10px;
  }
  .meta-grid .row-3 {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
  }
  .meta-grid input {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--mono);
    width: 100%;
    outline: none;
  }
  .meta-grid input:focus { border-color: var(--border2); }
  .meta-grid input::placeholder { color: var(--text3); }

  /* Select mode toolbar */
  .select-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 6px;
  }

  /* Plain "Select" button (non-active state) */
  .select-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--sans);
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.04em;
    transition: color 0.1s, background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    white-space: nowrap;
    outline: none;
  }
  .select-btn:hover { color: var(--text2); border-color: var(--border2); }

  /* Combined "N selected | ✕" pill shown when select mode is active */
  .select-active-btn {
    display: none;
    align-items: center;
    background: #2a2a40;
    border: 0.5px solid #5555aa;
    border-radius: var(--radius);
    font-size: 12px;
    font-family: var(--sans);
    color: #aaaaee;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
  }
  .select-active-btn .sel-left {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 8px 5px 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    /* Fixed width: enough for icon + 2-digit number + " selected" */
    min-width: 90px;
  }
  .select-active-btn .sel-left:hover { color: #ccccff; }
  .select-active-btn .sel-divider {
    width: 0.5px;
    align-self: stretch;
    background: #5555aa;
  }
  .select-active-btn .sel-right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px 9px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .select-active-btn .sel-right:hover { color: #ccccff; }

  .paint-roller-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: color 0.1s, background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    flex-shrink: 0;
  }
  .paint-roller-btn:hover { color: var(--text2); border-color: var(--border2); }
  .paint-roller-btn.pr-active { background: #2a2a40; border-color: #5555aa; color: #aaaaee; }

  /* Floating paint roller message */
  .pr-message {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a2a40;
    border: 0.5px solid #5555aa;
    border-radius: var(--radius);
    padding: 9px 16px;
    font-size: 13px;
    color: #aaaaee;
    font-family: var(--sans);
    z-index: 500;
    white-space: nowrap;
    pointer-events: none;
  }
  .pr-message.visible { display: block; }

  body.pr-mode .bar-input { cursor: crosshair; caret-color: transparent; touch-action: none; }
  body.pr-mode .bar-input::selection { background: transparent; }

  /* Lines area */
  .lines-area {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 8px;
  }

  /* Each line-block: optional title row + bar row */
  .line-block { display: flex; flex-direction: column; gap: 2px; }

  /* Title row — flush left, no gutter indent */
  .title-row {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .section-title-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-right: none;
    border-radius: var(--radius) 0 0 var(--radius);
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    text-align: left;
    outline: none;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .section-title-btn:hover { color: var(--text); background: var(--bg2); }
  .section-title-remove-btn {
    flex-shrink: 0;
    background: none;
    border: 0.5px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 0 8px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    line-height: 1;
    align-self: stretch;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .section-title-remove-btn:hover { color: var(--danger); background: var(--bg2); }

  /* Bar row */
  .bar-row {
    display: flex;
    align-items: stretch;
    width: 100%;
    min-width: 0;
  }

  /* Left gutter */
  .line-gutter {
    width: var(--left-gutter);
    min-width: var(--left-gutter);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-title-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    opacity: 1;
  }
  .add-title-btn:hover { color: var(--text2); background: var(--bg2); }

  .bars-container {
    display: flex;
    align-items: stretch;
    flex: 1;
    min-width: 0;
  }
  .bar-sep {
    width: 1px;
    min-width: 1px;
    background: var(--border);
    flex-shrink: 0;
    align-self: stretch;
  }
  .bar-input {
    flex: 1;
    min-width: 0;
    width: 100%;
    background: var(--bg2);
    border-top: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    border-left: none;
    border-right: none;
    padding: 8px 3px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--mono);
    text-align: center;
    outline: none;
    height: 38px;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .bar-input:focus {
    background: var(--bg3);
    border-top-color: var(--border2);
    border-bottom-color: var(--border2);
    z-index: 1;
    position: relative;
  }
  .bar-input.bar-selected {
    background: #1e1e38 !important;
    border-top-color: #5555aa !important;
    border-bottom-color: #5555aa !important;
    color: #ccccff !important;
    z-index: 1;
    position: relative;
  }
  body.select-mode .bar-input { cursor: pointer; caret-color: transparent; touch-action: none; }
  body.select-mode .bar-input::selection { background: transparent; }

  .line-options-btn {
    flex-shrink: 0;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 0 10px;
    height: 38px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .line-options-btn:hover { color: var(--text); background: var(--bg3); }

  /* Add line button */
  .add-line-btn {
    background: none;
    border: 0.5px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text3);
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    font-family: var(--sans);
    letter-spacing: 0.05em;
    transition: color 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 8px;
  }
  .add-line-btn:hover { color: var(--text2); border-color: var(--border2); }

  /* Output */
  .output-section { margin-top: 16px; }
  .output-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 6px;
  }
  .output-wrap {
    position: relative;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 80px 14px 14px;
  }
  .output-pre {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    white-space: pre;
    line-height: 1.75;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 7px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--border2); }

  .output-menu-btn {
    position: absolute;
    top: 10px;
    right: 46px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 7px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .output-menu-btn:hover { color: var(--text); border-color: var(--border2); }
  .output-menu-btn.active { background: #2a2a40; border-color: #5555aa; color: #aaaaee; }

  /* Key suggestion pills — sit inside the key input on the RHS */
  .key-pill {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 4px 9px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
    cursor: pointer;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    line-height: 1;
  }
  .key-pill:hover { color: var(--text); background: var(--border2); }

  /* Menus */
  .menu-overlay {
    position: fixed;
    z-index: 200;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    min-width: 180px;
    overflow: hidden;
  }
  .menu-overlay button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-overlay button:hover { background: var(--bg2); }
  .menu-overlay button.danger { color: var(--danger); }
  .menu-overlay button.active { font-weight: 700; }
  .menu-divider { height: 0.5px; background: var(--border); margin: 2px 0; }
  .menu-custom-input {
    display: none;
    width: calc(100% - 28px);
    margin: 4px 14px 10px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--mono);
    outline: none;
  }
  .menu-custom-input:focus { border-color: var(--text3); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 9px 20px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--sans);
    opacity: 0;
    transition: opacity 0.16s ease, transform 0.16s ease;
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Menu button */
  .menu-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 8px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    transition: color 0.1s, background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    outline: none;
  }
  .menu-btn:hover { color: var(--text2); border-color: var(--border2); }

  /* Import modal */
  .import-modal-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 14px;
  }

  .import-modal-backdrop.active {
    display: flex;
  }

  .import-modal {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .import-modal h2 {
    font-size: 16px;
    color: var(--text);
    margin: 0;
    font-weight: 500;
  }

  .import-modal textarea {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text);
    outline: none;
    resize: vertical;
    flex: 1;
    min-height: 200px;
  }

  .import-modal textarea:focus {
    border-color: var(--border2);
  }

  .import-modal textarea::placeholder {
    color: var(--text3);
  }

  .import-modal-buttons {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .import-modal-buttons button {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }

  .import-modal-buttons button:hover {
    background: var(--bg2);
    color: var(--text);
  }

  .import-modal-buttons button.primary {
    background: #2a2a50;
    border-color: #5555aa;
    color: #aaaaee;
  }

  .import-modal-buttons button.primary:hover {
    background: #333360;
    color: #bbbbff;
  }

  .import-warning {
    background: rgba(224, 85, 85, 0.1);
    border: 0.5px solid rgba(224, 85, 85, 0.3);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 12px;
    color: #ff9999;
    line-height: 1.4;
  }
</style>
</head>
<body>

<h1 style="display: flex; justify-content: space-between; align-items: center;">
  Chord Chart Editor
  <button class="menu-btn" id="menu-btn" title="Menu">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</h1>

<div class="meta-grid">
  <input id="m-title"     placeholder="Title"     autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-composer"  placeholder="Composer"  autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <div class="row-3">
    <input id="m-feel"    placeholder="Feel"      autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
    <div style="position:relative;min-width:0;">
      <input id="m-key" placeholder="Key" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" style="width:100%;padding-right:70px" />
      <div id="key-pills-row" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);display:flex;gap:4px;pointer-events:auto;"></div>
    </div>
    <input id="m-timesig" placeholder="Time sig" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
  </div>
  <input id="m-structure" placeholder="Structure" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" style="grid-column:1/-1" />
</div>

<div class="select-toolbar" id="select-toolbar">
  <button class="paint-roller-btn" id="paint-roller-btn" onclick="onPaintRollerClick()" title="Quick copy/paste">
    <svg id="roller-icon-outline" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="14" height="7" rx="2"/>
      <path d="M16 6.5h3a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-3"/>
      <line x1="9" y1="10" x2="9" y2="21"/>
      <line x1="7" y1="21" x2="11" y2="21"/>
    </svg>
    <svg id="roller-icon-filled" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
      <rect x="2" y="3" width="14" height="7" rx="2"/>
      <path d="M16 6.5h3a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-3"/>
      <line x1="9" y1="10" x2="9" y2="21" stroke-width="3"/>
      <line x1="7" y1="21" x2="11" y2="21" stroke-width="3"/>
    </svg>
  </button>
  <div class="select-active-btn" id="select-active-btn">
    <div class="sel-left" id="sel-left" onclick="showSelectionMenu(event)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      <span id="select-count">0</span> selected
    </div>
    <div class="sel-divider"></div>
    <div class="sel-right" onclick="exitSelectMode()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <button class="select-btn" id="select-btn" onclick="enterSelectMode()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1" opacity="0.4"/><rect x="3" y="14" width="7" height="7" rx="1" opacity="0.4"/><rect x="14" y="14" width="7" height="7" rx="1" opacity="0.4"/></svg>
    Select
  </button>
</div>

<div class="lines-area" id="lines-area"></div>
<button class="add-line-btn" id="add-line-btn" onclick="addLine()">+ add line</button>
<div class="pr-message" id="pr-message"></div>

<div class="output-section">
  <div class="output-label">Output</div>
  <div class="output-wrap">
    <pre class="output-pre" id="output"></pre>
    <button class="output-menu-btn" id="expand-toggle-btn" onclick="toggleExpandedOutput()" title="Expand structure">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="7 4 3 4 3 20 7 20"/><polyline points="17 4 21 4 21 20 17 20"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
      </svg>
    </button>
    <button class="output-menu-btn" id="output-menu-btn" onclick="showOutputMenu(event)" title="More options">

<script>
// ── Data model ─────────────────────────────────────────────────────────────
// lines: Array<{ title: string, bars: Array<string> }>
// title === '' means no section title on this line
let lines = [
  { title: 'A', bars: ['','','',''] },
  { title: '',  bars: ['','','',''] },
  { title: '',  bars: ['','','',''] },
  { title: '',  bars: ['','','',''] },
];

let menuState = null;
let outputTimer = null;
let toastTimer = null;

// ── Chord conversions ──────────────────────────────────────────────────────
const CONVERSIONS = [
  ['maj7','Δ7'], ['m7','m7'], ['h7','ø7'], ['ø7','ø7'], ['dim7','o'],
];
// ── Key detection ──────────────────────────────────────────────────────────
const NOTE_MAP = {
  'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,
  'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11
};
const MAJOR_KEY_NAMES = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const MINOR_KEY_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','Bb','B'];
const MAJOR_CHORD_OFFSETS = [0, 5];
const MINOR_CHORD_OFFSETS = [2, 4, 9];
const DOMINANT_OFFSET = 7;
const HALFDIM_OFFSET  = 11;

function parseChordsFromBarValue(raw) {
  const components = extractBarComponents(raw);
  const s = components.content;
  
  if (!s || s === '%') return null;
  const tokens = s.split(/\s+/).filter(Boolean);
  const result = [];
  for (let tok of tokens) {
    const si = tok.indexOf('/'); if (si !== -1) tok = tok.slice(0, si);
    if (!tok) continue;
    let noteName = (tok.length >= 2 && (tok[1]==='#'||tok[1]==='b')) ? tok.slice(0,2) : tok.slice(0,1);
    const semitone = NOTE_MAP[noteName];
    if (semitone === undefined) continue;
    const suffix = tok.slice(noteName.length);
    if (/^(ø|h7)/.test(suffix)) { result.push({ semitone, quality: 'hdim' }); continue; }
    const isMinor = suffix.startsWith('m') && !/^maj/i.test(suffix);
    if (isMinor) result.push({ semitone, quality: 'min' });
    else if (/^(7|9|11|13)/.test(suffix)) result.push({ semitone, quality: 'dom' });
    else result.push({ semitone, quality: 'maj' });
  }
  return result.length > 0 ? result : [];
}

function gatherChordWeights() {
  const weights = new Map();
  let prevChords = [];
  for (const line of lines) {
    for (const raw of line.bars) {
      const parsed = parseChordsFromBarValue(raw);
      let chords = parsed === null ? prevChords : parsed;
      if (parsed !== null && chords.length > 0) prevChords = chords;
      const weight = chords.length > 0 ? 1 / chords.length : 0;
      for (const { semitone, quality } of chords) {
        const k = semitone + ':' + quality;
        weights.set(k, (weights.get(k) || 0) + weight);
      }
    }
  }
  return weights;
}

function guessKey(weights) {
  let d = 0; for (const [,w] of weights) if (w > 0) d++;
  if (d < 2) return null;
  let bestScore = -1, bestRoot = -1;
  for (let root = 0; root < 12; root++) {
    let score = 0;
    for (const o of MAJOR_CHORD_OFFSETS) score += weights.get(((root+o)%12)+':maj') || 0;
    for (const o of MINOR_CHORD_OFFSETS) score += weights.get(((root+o)%12)+':min') || 0;
    score += weights.get(((root+DOMINANT_OFFSET)%12)+':dom')   || 0;
    score += weights.get(((root+HALFDIM_OFFSET) %12)+':hdim')  || 0;
    if (score > bestScore) { bestScore = score; bestRoot = root; }
  }
  return bestScore === 0 ? null : bestRoot;
}

function updateKeyPills() {
  const row = document.getElementById('key-pills-row');
  const keyInput = document.getElementById('m-key');

  // Hide when focused or has any value
  if (document.activeElement === keyInput || keyInput.value.trim() !== '') {
    row.innerHTML = '';
    return;
  }

  const root = guessKey(gatherChordWeights());
  if (root === null) { row.innerHTML = ''; return; }

  const minorRoot  = (root + 9) % 12;
  const majorFull  = MAJOR_KEY_NAMES[root] + ' major';
  const minorFull  = MINOR_KEY_NAMES[minorRoot] + ' minor';
  const majorShort = MAJOR_KEY_NAMES[root];
  const minorShort = MINOR_KEY_NAMES[minorRoot] + 'm';

  row.innerHTML = '';
  [[majorShort, majorFull], [minorShort, minorFull]].forEach(([short, full]) => {
    const pill = document.createElement('button');
    pill.className = 'key-pill';
    pill.textContent = short;
    pill.title = full;
    pill.addEventListener('mousedown', e => {
      e.preventDefault();
      keyInput.value = full;
      keyInput.dispatchEvent(new Event('input'));
      row.innerHTML = '';
    });
    pill.addEventListener('touchend', e => {
      e.preventDefault();
      keyInput.value = full;
      keyInput.dispatchEvent(new Event('input'));
      row.innerHTML = '';
    });
    row.appendChild(pill);
  });
}

// ── Output builder ─────────────────────────────────────────────────────────
let expandedOutputOn = true; // default on for testing

function buildOutput() {
  const song = buildSong();
  const displaySong = expandedOutputOn ? expandStructure(song) : song;
  document.getElementById('output').textContent = renderPlainText(displaySong);
  document.getElementById('expand-toggle-btn').classList.toggle('active', expandedOutputOn);
  updateKeyPills();
}

// ── Song object ─────────────────────────────────────────────────────────────
function barInputToBarObject(raw) {
  const { initialString, content, finalString } = extractBarComponents(raw);

  const hasOpen  = initialString === ':';
  const hasClose = finalString   === ':';
  let repeat = null;
  if (hasOpen && hasClose) repeat = 'both';
  else if (hasOpen)        repeat = 'start';
  else if (hasClose)       repeat = 'end';

  const nthMatch  = finalString.match(/^\s(\d)$/);
  const nthEnding = nthMatch ? parseInt(nthMatch[1]) : null;

  const trimmed = content.trim();
  if (trimmed === '' || trimmed === '%') {
    return { type: 'simile', repeat, nthEnding };
  }
  return { type: 'normal', chords: trimmed.split(/\s+/).filter(Boolean), repeat, nthEnding };
}

function buildSong() {
  const song = {
    title:     document.getElementById('m-title').value.trim(),
    composer:  document.getElementById('m-composer').value.trim(),
    style:     document.getElementById('m-feel').value.trim(),
    key:       document.getElementById('m-key').value.trim(),
    timeSig:   document.getElementById('m-timesig').value.trim(),
    structure: document.getElementById('m-structure').value.trim(),
    sections:  []
  };

  let currentSection = null;
  lines.forEach(line => {
    if (line.title || currentSection === null) {
      currentSection = { name: line.title || '', lines: [] };
      song.sections.push(currentSection);
    }
    const barObjects = line.bars.map(barInputToBarObject);

    // Spacer detection: empty bars before a 2nd-or-higher nth-time ending
    const firstNonEmptyIdx = barObjects.findIndex(b => b.type !== 'simile');
    if (firstNonEmptyIdx > 0) {
      const first = barObjects[firstNonEmptyIdx];
      if (first.nthEnding !== null && first.nthEnding >= 2) {
        for (let i = 0; i < firstNonEmptyIdx; i++) barObjects[i].type = 'spacer';
      }
    }

    currentSection.lines.push({ bars: barObjects });
  });

  return song;
}

// ── Plain text renderer ─────────────────────────────────────────────────────
function renderLineFromBarObjects(barObjects) {
  // Build intermediate representations from bar objects
  const intermediates = barObjects.map(bar => ({
    initialString: (bar.repeat === 'start' || bar.repeat === 'both') ? ':' : '',
    content:       bar.type === 'normal' ? bar.chords.join(' ') : '',
    finalString:   (bar.repeat === 'end'  || bar.repeat === 'both') ? ':' : '',
    nthEnding:     bar.nthEnding,
    isSpacer:      bar.type === 'spacer',
  }));

  // Move nth-time endings to the right position
  for (let i = 0; i < intermediates.length; i++) {
    const nth = intermediates[i].nthEnding;
    if (nth === null) continue;
    if (i === 0) {
      // First bar on line: number becomes part of the initial string
      intermediates[i].initialString = nth + '|';
    } else {
      // Not first bar: number goes as final char of the previous bar slot
      intermediates[i - 1].finalString = ' ' + nth;
    }
    intermediates[i].nthEnding = null;
  }

  // Render each bar
  let output = '';
  for (let i = 0; i < intermediates.length; i++) {
    const { initialString, content, finalString, isSpacer } = intermediates[i];
    // Spacer bars with no nth-time finalString use a space separator (not |)
    const separator = (isSpacer && finalString === '') ? ' ' : '|';
    output += formatBar(initialString, content, finalString, separator, i === 0, isSpacer);
  }
  return output;
}

function renderPlainText(song) {
  let out = '';
  const composerPart = song.composer ? '(' + song.composer + ')' : '';
  const titleLine = [song.title, composerPart].filter(Boolean).join(' ');
  const feelLine  = [song.style, song.key, song.timeSig].filter(Boolean).join(', ');
  if (titleLine)    out += titleLine    + '\n';
  if (feelLine)     out += feelLine     + '\n';
  if (song.structure) out += song.structure + '\n';

  song.sections.forEach(section => {
    if (section.name) out += '\n[' + section.name + ']\n';
    section.lines.forEach(line => {
      out += renderLineFromBarObjects(line.bars) + '\n';
    });
  });

  return out.trim();
}

// ── Extract bar components ──────────────────────────────────────────────────
function extractBarComponents(barInput) {
  const raw = barInput.trim();
  
  // Extract nth-time ending number if present
  let endingNumber = null;
  let content = raw;
  const endingMatch = raw.match(/^(\d)\s?(.*)$/);
  if (endingMatch) {
    endingNumber = endingMatch[1];
    content = endingMatch[2];
  }
  
  // Extract final string BEFORE initial string, so :| is treated as
  // closing repeat (finalString ':') not initial ':' plus final '|'
  let finalString = '';
  if (content.endsWith('||')) {
    finalString = '|';
    content = content.replace(/\s*\|\|$/, '').trim();
  } else if (content.endsWith(':|')) {
    finalString = ':';
    content = content.slice(0, -2).trim();
  } else if (content.endsWith('|')) {
    finalString = '|';
    content = content.slice(0, -1).trim();
  }

  // Extract initial string
  let initialString = '';
  if (content.startsWith('|:')) {
    initialString = ':';
    content = content.slice(2).trim();
  } else if (content.startsWith(':')) {
    initialString = ':';
    content = content.slice(1).trim();
  }
  
  // If we have an ending number, it becomes the final string
  if (endingNumber !== null) {
    finalString = ' ' + endingNumber;
  }
  
  return { initialString, content, finalString };
}

function formatBar(initialString, content, finalString, separator, isFirstBar = false, isSpacer = false) {
  const initialLen = initialString === ':' && isFirstBar ? 2 : initialString.length; // |: counts as 2
  const finalLen = finalString.length;
  const separatorLen = 1;
  const availableForContent = 8 - initialLen - finalLen;
  
  // Get chord symbols or determine if it's a repeat bar
  let layoutStr;
  if (!content || content === '%') {
    // All spacer bars (blank bars before nth-time ending) show blank, not %
    if (isSpacer || finalString.match(/^\s\d$/)) {
      layoutStr = ' '.repeat(availableForContent);
    } else {
      layoutStr = centerPercent(availableForContent);
    }
  } else {
    layoutStr = layoutChords(content, availableForContent, initialLen);
  }
  
  // Build output
  let output = '';
  
  // Handle initial string
  if (initialString === ':') {
    if (isFirstBar) {
      output = '|:'; // Prepend | only for first bar
    } else {
      output = ':';
    }
  } else if (/^\d\|$/.test(initialString)) {
    output = initialString; // nth-time initial like "2|"
  } else {
    output = initialString;
  }
  
  output += layoutStr + finalString + separator;
  return output;
}


function centerPercent(width) {
  if (width <= 0) return '';
  const side = Math.floor((width - 1) / 2);
  return ' '.repeat(side) + '%' + ' '.repeat(width - side - 1);
}

function layoutChords(content, availableWidth, initialLen) {
  const tokens = content.split(/\s+/).filter(Boolean);
  if (tokens.length === 0) return ' '.repeat(availableWidth);
  if (tokens.length === 1) return tokens[0].padEnd(availableWidth);

  // Minimum chars needed: all chord lengths + 1 space between each
  const totalChordLen = tokens.reduce((sum, t) => sum + t.length, 0);
  const minSpaceNeeded = totalChordLen + (tokens.length - 1);

  // If minimum >= available, just use 1 space between (no padding budget)
  if (minSpaceNeeded >= availableWidth) {
    return tokens.join(' ');
  }

  const totalPadding = availableWidth - minSpaceNeeded;

  // 4+ chords: no ideal positioning, just 1 space and pad remainder at end
  if (tokens.length >= 4) {
    return tokens.join(' ').padEnd(availableWidth);
  }

  // Ideal absolute positions in the 8-char bar: 2 chords → 0,4; 3 chords → 0,3,6
  const idealAbs = tokens.length === 2 ? [0, 4] : [0, 3, 6];

  // Ideal relative positions = ideal absolute - initialLen (first chord always at rel 0)
  const idealRel = idealAbs.map((p, i) => i === 0 ? 0 : Math.max(0, p - initialLen));

  let result = tokens[0];
  let cursor = tokens[0].length;
  let remainingPadding = totalPadding;

  for (let i = 1; i < tokens.length; i++) {
    // Mandatory 1 space
    result += ' ';
    cursor += 1;

    // Extra spaces: use lesser of (spaces needed to reach ideal) and (remaining padding budget)
    const neededExtra = Math.max(0, idealRel[i] - cursor);
    const extra = Math.min(neededExtra, remainingPadding);
    if (extra > 0) {
      result += ' '.repeat(extra);
      cursor += extra;
      remainingPadding -= extra;
    }

    result += tokens[i];
    cursor += tokens[i].length;
  }

  return result.padEnd(availableWidth);
}



function scheduleOutput() {
  clearTimeout(outputTimer);
  outputTimer = setTimeout(buildOutput, 280);
}

// ── Section title helpers ──────────────────────────────────────────────────
const PRESET_TITLES = ['A','B','C','D','Intro','Verse','Chorus','Solos','Riff','Outro'];

function nextAvailableTitle() {
  const usedTitles = new Set(lines.map(l => l.title).filter(Boolean));
  for (const letter of ['A','B','C','D','E','F','G']) {
    if (!usedTitles.has(letter)) return letter;
  }
  return '';
}

// ── Select & Paint Roller mode ─────────────────────────────────────────────
let selectMode    = false;
let prMode        = false; // paint roller mode (mutually exclusive with selectMode)
let prCopyMode    = false; // PR sub-state: selecting source bars
let prPasteMode   = false; // PR sub-state: selecting destination bars
let selectedBars  = new Set();
let isDragSelecting = false;
let dragSelectOriginKey = null;
let preDragSelection = new Set();
let preDragOriginWasSelected = false;
let pendingPasteDestination = false;
let pasteMode = false; // used by select-mode paste workflow only

function barKey(li, bi) { return li + ':' + bi; }

// ── PR mode helpers ────────────────────────────────────────────────────────
function setPRMessage(text) {
  const el = document.getElementById('pr-message');
  if (text) { el.textContent = text; el.classList.add('visible'); }
  else       { el.classList.remove('visible'); }
}

function enterPRCopyMode() {
  if (selectMode) exitSelectMode();
  prMode      = true;
  prCopyMode  = true;
  prPasteMode = false;
  pasteMode   = false;
  pendingPasteDestination = false;
  selectedBars.clear();
  document.body.classList.add('pr-mode');
  if (document.activeElement && document.activeElement.tagName === 'INPUT') document.activeElement.blur();
  render();
  updateSelectionUI();
  setPRMessage('Select bars to copy');
}

function enterPRPasteMode() {
  prCopyMode  = false;
  prPasteMode = true;
  pendingPasteDestination = true;
  selectedBars.clear();
  updateSelectionUI();
  setPRMessage('Selection copied. Select bars to paste to');
}

function exitPRMode() {
  prMode = prCopyMode = prPasteMode = false;
  pendingPasteDestination = false;
  isDragSelecting = false;
  dragSelectOriginKey = null;
  selectedBars.clear();
  document.body.classList.remove('pr-mode');
  render();
  updateSelectionUI();
  setPRMessage('');
}

function onPaintRollerClick() {
  if (prMode) {
    // Cancel PR mode entirely
    exitPRMode();
    return;
  }

  if (selectMode && selectedBars.size > 0) {
    // Workflow 3: bars already selected — copy FIRST, then exit select, enter PR paste
    internalClipboard = orderedSelectedKeys().map(k => getBarValue(k));
    exitSelectMode(); // clears selectedBars — clipboard already saved above
    prMode = true;
    document.body.classList.add('pr-mode');
    render();
    enterPRPasteMode();
    return;
  }

  // Workflows 1 & 2: enter PR copy mode
  enterPRCopyMode();
}

// ── Select mode ────────────────────────────────────────────────────────────
function enterSelectMode() {
  if (prMode) {
    // Cancel PR without calling render() — we'll render below
    prMode = prCopyMode = prPasteMode = false;
    pendingPasteDestination = false;
    isDragSelecting = false;
    dragSelectOriginKey = null;
    document.body.classList.remove('pr-mode');
    setPRMessage('');
  }
  selectMode  = true;
  pasteMode   = false;
  pendingPasteDestination = false;
  selectedBars.clear();
  document.getElementById('select-btn').style.display = 'none';
  document.getElementById('select-active-btn').style.display = 'flex';
  document.body.classList.add('select-mode');
  if (document.activeElement && document.activeElement.tagName === 'INPUT') document.activeElement.blur();
  render();
  updateSelectionUI();
}

function exitSelectMode() {
  selectMode  = false;
  pasteMode   = false;
  pendingPasteDestination = false;
  selectedBars.clear();
  isDragSelecting = false;
  dragSelectOriginKey = null;
  document.getElementById('select-btn').style.display = '';
  document.getElementById('select-active-btn').style.display = 'none';
  document.body.classList.remove('select-mode');
  render();
  updateSelectionUI();
}

function toggleSelectMode() {
  if (selectMode) exitSelectMode(); else enterSelectMode();
}

function updateSelectionUI() {
  const inPRorSelect = selectMode || prMode;
  document.querySelectorAll('.bar-input').forEach(inp => {
    inp.classList.toggle('bar-selected', inPRorSelect && selectedBars.has(inp.dataset.barKey));
  });
  const count = selectedBars.size;
  document.getElementById('select-count').textContent = count;

  const rollerBtn   = document.getElementById('paint-roller-btn');
  const outlineIcon = document.getElementById('roller-icon-outline');
  const filledIcon  = document.getElementById('roller-icon-filled');

  // Roller always visible; highlight when PR active; filled icon in paste sub-state
  rollerBtn.classList.toggle('pr-active', prMode);
  outlineIcon.style.display = prPasteMode ? 'none' : '';
  filledIcon.style.display  = prPasteMode ? '' : 'none';
}

function onBarPointerDown(e, li, bi) {
  if (!selectMode && !prMode) return;
  e.preventDefault();
  e.stopPropagation();
  const k = barKey(li, bi);

  // ── Paint Roller mode ──────────────────────────────────────────────────
  if (prMode) {
    if (prPasteMode) {
      // Destination drag — already in pendingPasteDestination
      selectedBars.clear();
      selectedBars.add(k);
      isDragSelecting = true;
      dragSelectOriginKey = k;
      preDragSelection = new Set();
      preDragOriginWasSelected = false;
      updateSelectionUI();
      if (e.pointerId !== undefined) { try { e.target.setPointerCapture(e.pointerId); } catch(_) {} }
      return;
    }
    if (prCopyMode) {
      // Source selection drag
      preDragSelection = new Set(selectedBars);
      preDragOriginWasSelected = selectedBars.has(k);
      isDragSelecting = true;
      dragSelectOriginKey = k;
      if (preDragOriginWasSelected) selectedBars.delete(k); else selectedBars.add(k);
      updateSelectionUI();
      if (e.pointerId !== undefined) { try { e.target.setPointerCapture(e.pointerId); } catch(_) {} }
      return;
    }
  }

  // ── Select mode ────────────────────────────────────────────────────────
  if (pasteMode) {
    pendingPasteDestination = true;
    preDragSelection = new Set();
    preDragOriginWasSelected = false;
    selectedBars.clear();
    selectedBars.add(k);
    isDragSelecting = true;
    dragSelectOriginKey = k;
    updateSelectionUI();
    if (e.pointerId !== undefined) { try { e.target.setPointerCapture(e.pointerId); } catch(_) {} }
    return;
  }

  preDragSelection = new Set(selectedBars);
  preDragOriginWasSelected = selectedBars.has(k);
  isDragSelecting = true;
  dragSelectOriginKey = k;
  if (preDragOriginWasSelected) selectedBars.delete(k); else selectedBars.add(k);
  updateSelectionUI();
  if (e.pointerId !== undefined) { try { e.target.setPointerCapture(e.pointerId); } catch(_) {} }
}

// Build a flat ordered list of all bar keys
function allBarKeys() {
  const keys = [];
  lines.forEach((line, li) => line.bars.forEach((_, bi) => keys.push(barKey(li, bi))));
  return keys;
}

function onGlobalPointerUp() {
  if (isDragSelecting) {
    isDragSelecting = false;
    dragSelectOriginKey = null;
    
    pendingPasteDestination = false;
  }
}

function onGlobalPointerUp() {
  if (isDragSelecting) {
    isDragSelecting = false;
    dragSelectOriginKey = null;
  }
}

document.addEventListener('pointerup', e => {
  if (!isDragSelecting) return;

  if (prMode && prCopyMode) {
    // Finished selecting source bars → copy and enter paste mode
    isDragSelecting = false;
    dragSelectOriginKey = null;
    if (selectedBars.size > 0) {
      internalClipboard = orderedSelectedKeys().map(k => getBarValue(k));
      enterPRPasteMode();
    }
    return;
  }

  if (prMode && prPasteMode && pendingPasteDestination) {
    // Finished selecting destination → paste
    if (selectedBars.size === 0 && dragSelectOriginKey) selectedBars.add(dragSelectOriginKey);
    pendingPasteDestination = false;
    isDragSelecting = false;
    dragSelectOriginKey = null;
    executePRPaste();
    return;
  }

  if (pendingPasteDestination) {
    // Select-mode paste destination
    if (selectedBars.size === 0 && dragSelectOriginKey) selectedBars.add(dragSelectOriginKey);
    pendingPasteDestination = false;
    isDragSelecting = false;
    dragSelectOriginKey = null;
    executePaste();
    return;
  }

  onGlobalPointerUp();
});
document.addEventListener('pointercancel', onGlobalPointerUp);

document.addEventListener('pointermove', e => {
  if ((!selectMode && !prMode) || !isDragSelecting) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (!el || !el.classList.contains('bar-input') || !el.dataset.barKey) return;
  const curKey = el.dataset.barKey;
  const allKeys = allBarKeys();
  const originIdx = allKeys.indexOf(dragSelectOriginKey);
  const curIdx    = allKeys.indexOf(curKey);
  if (originIdx === -1 || curIdx === -1) return;
  const lo = Math.min(originIdx, curIdx);
  const hi = Math.max(originIdx, curIdx);

  if (pendingPasteDestination || prPasteMode) {
    selectedBars.clear();
    for (let i = lo; i <= hi; i++) selectedBars.add(allKeys[i]);
  } else {
    selectedBars = new Set(preDragSelection);
    for (let i = lo; i <= hi; i++) {
      const k = allKeys[i];
      if (preDragOriginWasSelected) selectedBars.delete(k);
      else selectedBars.add(k);
    }
  }
  updateSelectionUI();
});

// Convert our chord notation to iReal notation
function toIRealChord(raw) {
  if (!raw || raw.trim() === '') return '';
  let s = raw.trim();
  // Strip slash bass temporarily
  let bass = '';
  const slashIdx = s.indexOf('/');
  if (slashIdx !== -1) {
    bass = s.slice(slashIdx);
    s = s.slice(0, slashIdx);
  }
  // Order matters: longer patterns first
  s = s
    .replace(/dim7/gi, 'o7')         // before m replacement
    .replace(/maj7/gi, '^7')         // before m replacement
    .replace(/Δ7/g,    '^7')
    .replace(/ø7/g,    'h7')
    .replace(/m(?!aj|a)/g, '-');     // m -> - but not in maj/ma
  return s + bass;
}

// Apply s/l size tokens per spec:
// s before first chord of a consecutive run
// l before last chord of a consecutive run (on that chord itself, per spec)
function applySL(cells) {
  const n = cells.length;
  const isChord = i => i >= 0 && i < n && cells[i] !== ' ' && cells[i] !== 'x';

  const out = [...cells];
  for (let i = 0; i < n; i++) {
    if (!isChord(i)) continue;
    const prevChord = isChord(i - 1);
    const nextChord = isChord(i + 1);

    if (!prevChord && nextChord) {
      // Start of a run of 2+
      out[i] = 's' + out[i];
    } else if (prevChord && !nextChord) {
      // End of a run of 2+
      out[i] = 'l' + out[i];
    }
    // Middle of run: no prefix
    // Lone chord: no prefix
  }
  return out;
}

// Map our section title to iReal rehearsal mark token
function toIRealSection(title) {
  if (!title) return '';
  const map = { 'A':'*A','B':'*B','C':'*C','D':'*D','Intro':'*i','Verse':'*V' };
  return map[title] || '';
}

// Expand structure string into ordered array of section letter keys
// e.g. "AABA" -> ['A','A','B','A']
function parseStructure(str) {
  if (!str) return null;
  const result = [];
  for (const ch of str.toUpperCase()) {
    if (ch >= 'A' && ch <= 'Z') result.push(ch);
  }
  return result.length > 0 ? result : null;
}

// Cell distribution across bars on a line (must total 16)
function getCellDistribution(numBars) {
  const map = {
    1: [16],
    2: [8, 8],
    3: [6, 5, 5],
    4: [4, 4, 4, 4],
    5: [4, 3, 3, 3, 3],
    6: [3, 3, 3, 3, 2, 2],
    7: [3, 3, 2, 2, 2, 2, 2],
    8: [2, 2, 2, 2, 2, 2, 2, 2],
  };
  return map[numBars] || Array(numBars).fill(2);
}

// Render a bar object's cells array for iReal
function renderBarCells(bar, numCells) {
  if (bar.type === 'spacer') return Array(numCells).fill(' ');

  if (bar.type === 'simile') {
    const cells = Array(numCells).fill(' ');
    cells[Math.max(1, Math.floor(numCells / 2)) - 1] = 'x'; // 1-indexed → 0-indexed
    return cells;
  }

  // Normal bar
  const chords = bar.chords.map(toIRealChord).filter(Boolean);
  if (chords.length === 0) return Array(numCells).fill(' ');

  let n = chords.length > numCells ? chords.length : numCells;
  const cells = Array(n).fill(' ');
  chords.forEach((chord, idx) => {
    cells[Math.ceil(1 + idx * (n / chords.length)) - 1] = chord;
  });
  return cells;
}

// ── Structure expansion ─────────────────────────────────────────────────────

function extractCompactStructure(structureStr, sections) {
  if (!structureStr) return null;
  const sectionNames = new Set(sections.map(s => s.name).filter(Boolean));
  const tokens = structureStr.split(/\s+/);
  for (const token of tokens) {
    if (!token) continue;
    // Every character must be uppercase and match a section name
    const chars = token.split('');
    if (chars.every(c => c === c.toUpperCase() && c >= 'A' && c <= 'Z' && sectionNames.has(c))) {
      return chars;
    }
  }
  return null;
}

function groupIntoRuns(letters) {
  const runs = [];
  for (const letter of letters) {
    if (runs.length && runs[runs.length - 1].letter === letter) {
      runs[runs.length - 1].count++;
    } else {
      runs.push({ letter, count: 1 });
    }
  }
  return runs;
}

// Deep clone a bar object
function cloneBar(bar) { return JSON.parse(JSON.stringify(bar)); }

// Parse a section into shared lines + nth-time ending info
// Returns:
// {
//   sharedLines: [line, ...],           // lines before the nth-time ending line
//   nthLinePrefix: [bar, ...],          // bars on the nth-time line before the first nth marker
//   endings: [{ nthEnding, bars }],     // one entry per ending passage (no spacers, no nthEnding on bars)
// }
function parseNthEndings(section) {
  const allLines = section.lines;

  // Find which line contains the first nth-time ending bar
  let nthLineIdx = -1;
  let nthBarIdx  = -1;
  outer: for (let li = 0; li < allLines.length; li++) {
    for (let bi = 0; bi < allLines[li].bars.length; bi++) {
      if (allLines[li].bars[bi].nthEnding !== null) {
        nthLineIdx = li;
        nthBarIdx  = bi;
        break outer;
      }
    }
  }

  if (nthLineIdx === -1) {
    return { sharedLines: allLines, nthLinePrefix: [], endings: [] };
  }

  const sharedLines = allLines.slice(0, nthLineIdx);
  const nthLine     = allLines[nthLineIdx].bars;

  // Bars before the first nth marker on the first nth line (skip spacers too)
  let prefixEnd = nthBarIdx;
  while (prefixEnd > 0 && nthLine[prefixEnd - 1].type === 'spacer') prefixEnd--;
  const nthLinePrefix = nthLine.slice(0, prefixEnd).map(cloneBar);

  // Build flat bar list WITH line break info from nthLineIdx onwards
  const flatBarsWithLines = [];
  for (let li = nthLineIdx; li < allLines.length; li++) {
    const lineBars = allLines[li].bars;
    for (let bi = 0; bi < lineBars.length; bi++) {
      flatBarsWithLines.push({
        bar: lineBars[bi],
        lineIdx: li - nthLineIdx,
        isFirstOnLine: bi === 0
      });
    }
  }
  const flatBars = flatBarsWithLines.map(fb => fb.bar);

  // Find all nth-time marker positions in the flat sequence
  const nthPositions = flatBars
    .map((b, i) => b.nthEnding !== null ? i : -1)
    .filter(i => i !== -1);

  // Build each ending passage using correct boundary criteria
  const endings = [];
  for (let e = 0; e < nthPositions.length; e++) {
    const start = nthPositions[e];

    // End: next spacer OR next nth marker OR end of flat sequence
    let end = flatBars.length;
    for (let j = start + 1; j < flatBars.length; j++) {
      if (flatBars[j].type === 'spacer' || flatBars[j].nthEnding !== null) {
        end = j;
        break;
      }
    }

    const originalNth = flatBars[start].nthEnding;

    // Build bars WITH line break info, stripping leading spacers
    const rawEntries = flatBarsWithLines.slice(start, end)
      .filter(fb => fb.bar.type !== 'spacer');

    // Group into lines based on lineIdx changes
    // Each time lineIdx changes, start a new line
    const lines = [];
    let currentLine = [];
    let currentLineIdx = rawEntries.length > 0 ? rawEntries[0].lineIdx : -1;

    for (const entry of rawEntries) {
      if (entry.lineIdx !== currentLineIdx && currentLine.length > 0) {
        lines.push(currentLine);
        currentLine = [];
        currentLineIdx = entry.lineIdx;
      }
      const nb = cloneBar(entry.bar);
      nb.nthEnding = null;
      currentLine.push(nb);
    }
    if (currentLine.length > 0) lines.push(currentLine);

    endings.push({ originalNth, lines }); // lines: array of bar arrays
  }

  return { sharedLines, nthLinePrefix, endings };
}

// Build section output for one run (one or more consecutive occurrences)
function buildRunSections(sectionObj, runCount, _unused, endingCursors) {
  const name = sectionObj.name;
  const { sharedLines, nthLinePrefix, endings } = parseNthEndings(sectionObj);
  const numEndings = endings.length;

  // ── No nth-time endings ──────────────────────────────────────────────────
  if (numEndings === 0) {
    const sec = JSON.parse(JSON.stringify(sectionObj));
    if (runCount > 1) {
      const allBars = sec.lines.flatMap(l => l.bars);
      if (allBars.length > 0) {
        const fb = allBars[0];
        fb.repeat = (fb.repeat === 'end' || fb.repeat === 'both') ? 'both' : 'start';
        const lb = allBars[allBars.length - 1];
        lb.repeat = (lb.repeat === 'start' || lb.repeat === 'both') ? 'both' : 'end';
      }
    }
    return { sections: [sec] };
  }

  // ── Has nth-time endings ─────────────────────────────────────────────────
  let cur = endingCursors.get(name) || 0;

  if (runCount === 1) {
    const endingIdx = Math.min(cur, numEndings - 1);
    const ending    = endings[endingIdx];
    const endingLines = ending.lines;

    // First line: nthLinePrefix + first ending line bars (plain, no nth marker)
    const firstLineBars = [...nthLinePrefix.map(cloneBar), ...endingLines[0].map(cloneBar)];
    const outputLines = [
      ...sharedLines.map(l => JSON.parse(JSON.stringify(l))),
      { bars: firstLineBars },
      ...endingLines.slice(1).map(line => ({ bars: line.map(cloneBar) }))
    ];

    endingCursors.set(name, Math.min(cur + 1, numEndings));
    return { sections: [{ name, lines: outputLines }] };
  }

  // Repeating run: cycle back if cursor exhausted at start of run
  if (cur >= numEndings) cur = 0;

  // Assign endings to each occurrence
  const assigned = [];
  let c = cur;
  for (let occ = 0; occ < runCount; occ++) {
    const endingIdx = c < numEndings ? c : numEndings - 1;
    assigned.push(endings[endingIdx]);
    c++;
  }

  // All-identical check using first line of each ending
  const allIdentical = assigned.every(e =>
    JSON.stringify(e.lines) === JSON.stringify(assigned[0].lines)
  );

  // ── All-identical endings ────────────────────────────────────────────────
  if (allIdentical) {
    const firstEndingLines = assigned[0].lines;
    const outputLines = sharedLines.map(l => JSON.parse(JSON.stringify(l)));
    // First line of ending: nthLinePrefix + first ending line bars
    outputLines.push({ bars: [...nthLinePrefix.map(cloneBar), ...firstEndingLines[0].map(cloneBar)] });
    // Remaining ending lines as-is
    for (let li = 1; li < firstEndingLines.length; li++) {
      outputLines.push({ bars: firstEndingLines[li].map(cloneBar) });
    }
    const allBars = outputLines.flatMap(l => l.bars);
    if (allBars.length > 0) {
      const fb = allBars[0];
      fb.repeat = (fb.repeat === 'end' || fb.repeat === 'both') ? 'both' : 'start';
      const lb = allBars[allBars.length - 1];
      lb.repeat = (lb.repeat === 'start' || lb.repeat === 'both') ? 'both' : 'end';
    }
    endingCursors.set(name, Math.min(cur + runCount, numEndings));
    return { sections: [{ name, lines: outputLines }] };
  }

  // ── Normal repeating run with distinct endings ───────────────────────────
  const outputLines = sharedLines.map(l => JSON.parse(JSON.stringify(l)));

  // Opening repeat on first bar of entire section
  const firstSharedBar = outputLines.length > 0 ? outputLines[0].bars[0] : null;
  if (firstSharedBar) {
    firstSharedBar.repeat = (firstSharedBar.repeat === 'end' || firstSharedBar.repeat === 'both') ? 'both' : 'start';
  }

  for (let occ = 0; occ < runCount; occ++) {
    const ending = assigned[occ];
    const newNth = occ + 1;
    const endingLines = ending.lines;

    // First line of this ending
    const firstLineEndingBars = endingLines[0].map((b, bi) => {
      const nb = cloneBar(b);
      if (bi === 0) nb.nthEnding = newNth;
      return nb;
    });

    let firstLineBars;
    if (occ === 0) {
      firstLineBars = [...nthLinePrefix.map(cloneBar), ...firstLineEndingBars];
    } else {
      const spacers = nthLinePrefix.map(() => ({
        type: 'spacer', chords: [], repeat: null, nthEnding: null
      }));
      firstLineBars = [...spacers, ...firstLineEndingBars];
    }

    // Closing repeat on last bar of all-but-last occurrence
    const isLastOcc = occ === runCount - 1;
    // Find very last bar of this ending across all its lines
    const allEndingBars = endingLines.flatMap(l => l);
    if (!isLastOcc && allEndingBars.length > 0) {
      const lb = isLastOcc ? null : allEndingBars[allEndingBars.length - 1];
      if (lb) lb.repeat = (lb.repeat === 'start' || lb.repeat === 'both') ? 'both' : 'end';
    }

    outputLines.push({ bars: firstLineBars });

    // Remaining lines of this ending
    for (let li = 1; li < endingLines.length; li++) {
      outputLines.push({ bars: endingLines[li].map(cloneBar) });
    }
  }

  endingCursors.set(name, Math.min(cur + runCount, numEndings));
  return { sections: [{ name, lines: outputLines }] };

  endingCursors.set(name, Math.min(cur + runCount, numEndings));
  return { sections: [{ name, lines: outputLines }] };
}

function expandStructure(song) {
  try {
    const s = JSON.parse(JSON.stringify(song));
    const compact = extractCompactStructure(s.structure, s.sections);
    
    if (!compact) {
      // No compact structure found — just apply implied repeats
      return addImpliedRepeats(s);
    }

    const runs = groupIntoRuns(compact);
    
    // Match runs to provisional sections greedily (by index, not name)
    // For each run, find next unused section with matching name
    const usedIndices = new Set();
    const runMatches = []; // { run, sectionIdx }

    for (const run of runs) {
      // Find next unused matching section
      let matchIdx = -1;
      for (let i = 0; i < s.sections.length; i++) {
        if (!usedIndices.has(i) && s.sections[i].name === run.letter) {
          matchIdx = i;
          break;
        }
      }
      // Fall back to first matching (already used)
      if (matchIdx === -1) {
        matchIdx = s.sections.findIndex(sec => sec.name === run.letter);
      }
      if (matchIdx !== -1) {
        usedIndices.add(matchIdx);
        runMatches.push({ run, sectionIdx: matchIdx });
      }
    }

    // Build output in extracted structure order, interleaving unmatched provisionals
    const endingCursors = new Map();
    const outputSections = [];
    const matchedPIs = new Set(runMatches.map(m => m.sectionIdx));
    let lastEmittedPI = -1;

    for (const { run, sectionIdx } of runMatches) {
      // Emit any unmatched provisional sections that come before this run's pi
      for (let pi = lastEmittedPI + 1; pi < sectionIdx; pi++) {
        if (!matchedPIs.has(pi)) {
          outputSections.push(s.sections[pi]);
        }
      }
      lastEmittedPI = sectionIdx;

      // Emit this run
      const { sections } = buildRunSections(
        s.sections[sectionIdx], run.count, 0, endingCursors
      );
      outputSections.push(...sections);
    }

    // Emit any remaining unmatched provisional sections after the last run
    for (let pi = lastEmittedPI + 1; pi < s.sections.length; pi++) {
      if (!matchedPIs.has(pi)) {
        outputSections.push(s.sections[pi]);
      }
    }

    const expandedSong = { ...s, sections: outputSections };
    return addImpliedRepeats(expandedSong);
  } catch (e) {
    console.warn('expandStructure error:', e);
    return song;
  }
}

// ── Implied repeat detection ────────────────────────────────────────────────
function addImpliedRepeats(song) {
  // Work on a deep copy — never mutate the live Song object
  const s = JSON.parse(JSON.stringify(song));

  // Build a flat array of every bar with section context
  const flat = [];
  s.sections.forEach((section, sectionIdx) => {
    section.lines.forEach(line => {
      line.bars.forEach(bar => {
        flat.push({ bar, section, sectionIdx });
      });
    });
  });

  // For each nth-time ending bar, find its passage and add implied repeats
  for (let i = 0; i < flat.length; i++) {
    const { bar: nthBar, sectionIdx } = flat[i];
    if (nthBar.nthEnding === null) continue;

    // Walk forward to find the last bar of this ending passage
    let lastIdx = i;
    let stoppingCondition = 'end'; // end of song

    for (let j = i + 1; j < flat.length; j++) {
      const fb = flat[j];
      if (fb.bar.type === 'spacer') {
        stoppingCondition = 'spacer';
        break;
      }
      if (fb.bar.nthEnding !== null) {
        stoppingCondition = 'nthTime';
        break;
      }
      if (fb.sectionIdx !== sectionIdx) {
        stoppingCondition = 'newSection';
        break;
      }
      lastIdx = j;
    }

    // Only act on non-final endings (stopped by spacer or another nth-time)
    if (stoppingCondition !== 'spacer' && stoppingCondition !== 'nthTime') continue;

    const lastBar = flat[lastIdx].bar;

    // If closing repeat already present, trust the user's explicit markup
    if (lastBar.repeat === 'end' || lastBar.repeat === 'both') continue;

    // Add closing repeat to the last bar of the ending passage
    lastBar.repeat = lastBar.repeat === 'start' ? 'both' : 'end';

    // Add opening repeat to the first bar of the section (if not already present)
    const firstFlat = flat.find(fb => fb.sectionIdx === sectionIdx);
    if (firstFlat) {
      const firstBar = firstFlat.bar;
      if (firstBar.repeat !== 'start' && firstBar.repeat !== 'both') {
        firstBar.repeat = firstBar.repeat === 'end' ? 'both' : 'start';
      }
    }
  }

  return s;
}

function exportIReal() {
  const song = expandStructure(buildSong());

  // ── Metadata ──────────────────────────────────────────────────────────────
  const songTitle = song.title || 'Untitled';
  let composer = 'Unknown';
  if (song.composer) {
    const parts = song.composer.trim().split(/\s+/);
    composer = parts.length === 2
      ? parts[1] + ' ' + parts[0]   // First Last → Last First
      : song.composer.trim();        // 1 or 3+ parts: leave as entered
  }
  const styleMap = {
    'swing': 'Medium Swing', 'med swing': 'Medium Swing', 'medium swing': 'Medium Swing',
    'fast swing': 'Medium Up Swing', 'up swing': 'Medium Up Swing',
    'ballad': 'Ballad', 'bossa': 'Bossa Nova', 'bossa nova': 'Bossa Nova',
    'latin': 'Latin', 'waltz': 'Jazz Waltz', 'jazz waltz': 'Jazz Waltz',
    'bolero': 'Bolero', 'funk': 'Funk', 'blues': 'Medium Swing',
  };
  const style = styleMap[song.style.toLowerCase()] || song.style || 'Medium Swing';

  function normaliseKey(raw) {
    if (!raw) return 'C';
    const s = raw.trim();
    if (/^[A-G][b#]?-$/.test(s)) return s;
    const minorMatch = s.match(/^([A-G][b#]?)\s*(minor|min|m|-)\b/i);
    if (minorMatch) return minorMatch[1] + '-';
    const majorMatch = s.match(/^([A-G][b#]?)/);
    if (majorMatch) return majorMatch[1];
    return 'C';
  }
  const key = normaliseKey(song.key);

  // ── Play sequence from structure ──────────────────────────────────────────
  const sectionMap = new Map();
  const seenTitles = new Map();
  song.sections.forEach(sec => {
    const t = sec.name;
    const count = seenTitles.get(t) || 0;
    seenTitles.set(t, count + 1);
    sectionMap.set(t + '_' + count, sec);
    if (!sectionMap.has(t)) sectionMap.set(t, sec);
  });

  const structureParsed = parseStructure(song.structure);
  let orderedSections; // [{section, openRepeat, closeRepeat}]

  if (structureParsed) {
    const playSequence = [];
    let i = 0;
    while (i < structureParsed.length) {
      const title = structureParsed[i];
      let run = 1;
      while (i + run < structureParsed.length && structureParsed[i + run] === title) run++;
      const sec = sectionMap.get(title) || sectionMap.get(title + '_0');
      if (sec) playSequence.push({ section: sec, openRepeat: run >= 2, closeRepeat: run >= 2 });
      i += run;
    }
    orderedSections = playSequence;
  } else {
    orderedSections = song.sections.map(sec => ({ section: sec, openRepeat: false, closeRepeat: false }));
  }
  if (!orderedSections.length) return;

  // ── Build bar items ────────────────────────────────────────────────────────
  // Each item: { cells, openStr, closeStr }
  // Then do a global s/l pass before building the block string.
  const allBarItems = [];
  let isFirstBarEver = true;

  orderedSections.forEach((entry, entryIdx) => {
    const { section, openRepeat, closeRepeat } = entry;
    const isLastSection = entryIdx === orderedSections.length - 1;
    const rehearsalMark = toIRealSection(section.name);
    const customText = section.name && !rehearsalMark ? `<*69${section.name}>` : '';

    section.lines.forEach((line, lineIdx) => {
      const isFirstLineOfSection = lineIdx === 0;
      const isLastLineOfSection  = lineIdx === section.lines.length - 1;
      const numBars = line.bars.length;
      const cellDist = getCellDistribution(numBars);

      line.bars.forEach((bar, barIdx) => {
        const isFirstBarOfSection = isFirstLineOfSection && barIdx === 0;
        const isLastBarOfSection  = isLastLineOfSection  && barIdx === numBars - 1;
        const numCells = cellDist[barIdx];

        // ── Spacer bars ────────────────────────────────────────────────────
        if (bar.type === 'spacer') {
          const cells = Array(numCells).fill(' ');
          const nextBar = barIdx < numBars - 1 ? line.bars[barIdx + 1] : null;
          const closeBL = (!nextBar || nextBar.type !== 'spacer') ? '|' : '';
          allBarItems.push({ cells, openStr: '', closeStr: closeBL, isSpacer: true });
          return;
        }

        // ── Normal / simile bars ───────────────────────────────────────────
        const cells = renderBarCells(bar, numCells);

        // Opening barline
        let openBL = '';
        if (isFirstBarOfSection) {
          openBL = (openRepeat || bar.repeat === 'start' || bar.repeat === 'both') ? '{' : '[';
        } else if (bar.repeat === 'start' || bar.repeat === 'both') {
          openBL = '{';
        }

        // Closing barline
        let closeBL = '|';
        if (isLastBarOfSection) {
          if (closeRepeat || bar.repeat === 'end' || bar.repeat === 'both') closeBL = '}';
          else if (isLastSection) closeBL = 'Z';
          else closeBL = ']';
        } else if (bar.repeat === 'end' || bar.repeat === 'both') {
          closeBL = '}';
        }

        // Build opening string:
  // Map time signature to iReal token (default T44)
  function toIRealTimeSig(ts) {
    const map = {
      '4/4': 'T44', '3/4': 'T34', '5/4': 'T54', '6/4': 'T64', '7/4': 'T74',
      '2/2': 'T22', '3/2': 'T32', '5/8': 'T58', '6/8': 'T68', '7/8': 'T78',
      '9/8': 'T98', '12/8': 'T12',
    };
    return map[ts] || 'T44';
  }
  const timeSigToken = toIRealTimeSig(song.timeSig);

        // [rehearsalMark] [openBL] [T44 if first] [customText] [Nth marker] ...cells
        let openStr = '';
        if (isFirstBarOfSection) openStr += rehearsalMark;
        openStr += openBL;
        if (isFirstBarEver) { openStr += timeSigToken; isFirstBarEver = false; }
        if (isFirstBarOfSection && customText) openStr += customText;
        if (bar.nthEnding !== null) openStr += 'N' + bar.nthEnding;

        allBarItems.push({ cells, openStr, closeStr: closeBL, isSpacer: false });
      });
    });
  });

  // ── Global s/l pass ────────────────────────────────────────────────────────
  // Build flat cell records: include isLastInBar for "immediately before barline" check
  const flatCells = [];
  allBarItems.forEach((item, itemIdx) => {
    item.cells.forEach((cell, cellIdx) => {
      flatCells.push({
        itemIdx,
        cellIdx,
        content: cell,
        isLastInBar: cellIdx === item.cells.length - 1,
        isSpacer: item.isSpacer,
      });
    });
  });

  const isChordCell = c => c !== ' ' && c !== 'x' && c !== 'r' && c !== 'n';

  let inRun = false;
  for (let i = 0; i < flatCells.length; i++) {
    const fc = flatCells[i];
    if (fc.isSpacer || !isChordCell(fc.content)) continue;

    const next = flatCells[i + 1];
    const nextIsChord = next && !next.isSpacer && isChordCell(next.content);
    const cramped = nextIsChord || fc.isLastInBar;

    if (cramped && !inRun) {
      fc.content = 's' + fc.content;
      inRun = true;
    } else if (!cramped && inRun) {
      fc.content = 'l' + fc.content;
      inRun = false;
    }
  }

  // Write s/l-annotated content back
  flatCells.forEach(fc => {
    allBarItems[fc.itemIdx].cells[fc.cellIdx] = fc.content;
  });

  // ── Build block string ─────────────────────────────────────────────────────
  let block = '';
  allBarItems.forEach(({ cells, openStr, closeStr }) => {
    block += openStr + cells.join(',') + closeStr;
  });

  // ── Build and open URL ────────────────────────────────────────────────────
  const clean = s => s.replace(/[\r\n]/g, '');
  const rawUrl = 'irealbook://' +
    clean(songTitle) + '=' +
    clean(composer)  + '=' +
    clean(style)     + '=' +
    clean(key)       + '=n=' +
    clean(block);

  // encodeURIComponent encodes everything unsafe ([]{|}^#<> etc.)
  // Then restore characters that must stay literal for iReal to parse:
  //   =  field delimiters
  //   ,  cell separators in chord block
  //   /  slash chords (C/G) and scheme separator (//)
  //   :  scheme colon (irealbook:)
  const url = encodeURIComponent(rawUrl)
    .replace(/%3D/gi, '=')
    .replace(/%2C/gi, ',')
    .replace(/%2F/gi, '/')
    .replace(/%3A/gi, ':');

  console.log('iReal URL:', url);
  const a = document.createElement('a');
  a.href = url;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  showToast('Opening in iReal Pro…');
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const area = document.getElementById('lines-area');
  area.innerHTML = '';

  lines.forEach((line, li) => {
    const block = document.createElement('div');
    block.className = 'line-block';

    // Title row (only if line has a section title)
    if (line.title) {
      const titleRow = document.createElement('div');
      titleRow.className = 'title-row';

      const titleBtn = document.createElement('button');
      titleBtn.className = 'section-title-btn';
      titleBtn.textContent = '¶ ' + line.title;
      titleBtn.setAttribute('tabindex', '-1');
      titleBtn.addEventListener('click', e => { e.stopPropagation(); showTitleMenu(e, li); });

      const removeBtn = document.createElement('button');
      removeBtn.className = 'section-title-remove-btn';
      removeBtn.setAttribute('tabindex', '-1');
      removeBtn.setAttribute('title', 'Remove section title');
      removeBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      removeBtn.addEventListener('click', e => {
        e.stopPropagation();
        lines[li].title = '';
        render();
      });

      titleRow.appendChild(titleBtn);
      titleRow.appendChild(removeBtn);
      block.appendChild(titleRow);
    }

    // Bar row
    const barRow = document.createElement('div');
    barRow.className = 'bar-row';

    // Left gutter
    const gutter = document.createElement('div');
    gutter.className = 'line-gutter';
    if (!line.title) {
      const addTitleBtn = document.createElement('button');
      addTitleBtn.className = 'add-title-btn';
      addTitleBtn.setAttribute('tabindex', '-1');
      addTitleBtn.setAttribute('title', 'Add section title');
      addTitleBtn.textContent = '¶';
      addTitleBtn.addEventListener('click', e => {
        e.stopPropagation();
        lines[li].title = nextAvailableTitle();
        render();
      });
      gutter.appendChild(addTitleBtn);
    }
    barRow.appendChild(gutter);

    // Bars outer wrap
    const outerWrap = document.createElement('div');
    outerWrap.style.cssText = 'display:flex;align-items:stretch;flex:1;min-width:0;border:0.5px solid var(--border);border-right:none;border-radius:6px 0 0 6px;overflow:hidden';

    const barsContainer = document.createElement('div');
    barsContainer.className = 'bars-container';

    line.bars.forEach((val, bi) => {
      const inp = document.createElement('input');
      inp.className = 'bar-input';
      inp.value = val;
      inp.dataset.barKey = barKey(li, bi);
      inp.setAttribute('autocomplete', 'off');
      inp.setAttribute('autocorrect', 'off');
      inp.setAttribute('autocapitalize', 'words');
      inp.setAttribute('spellcheck', 'false');
      if (selectMode || prMode) {
        inp.setAttribute('readonly', 'true');
        inp.classList.toggle('bar-selected', selectedBars.has(barKey(li, bi)));
        inp.addEventListener('pointerdown', e => onBarPointerDown(e, li, bi));
      } else {
        inp.addEventListener('input', e => {
          lines[li].bars[bi] = e.target.value;
          scheduleOutput();
        });
      }
      barsContainer.appendChild(inp);
      const sep = document.createElement('div');
      sep.className = 'bar-sep';
      barsContainer.appendChild(sep);
    });

    outerWrap.appendChild(barsContainer);

    const lineOptBtn = document.createElement('button');
    lineOptBtn.className = 'line-options-btn';
    lineOptBtn.setAttribute('tabindex', '-1');
    lineOptBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>`;
    lineOptBtn.addEventListener('click', e => { e.stopPropagation(); showLineMenu(e, li); });

    barRow.appendChild(outerWrap);
    barRow.appendChild(lineOptBtn);
    block.appendChild(barRow);
    area.appendChild(block);
  });

  buildOutput();
}

// ── Title picker menu ──────────────────────────────────────────────────────
function showTitleMenu(e, li) {
  closeMenu();
  const rect = e.currentTarget.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';
  m.style.minWidth = '160px';

  let left = rect.left;
  const menuW = 170;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  if (left < 8) left = 8;
  m.style.top  = (rect.bottom + 4) + 'px';
  m.style.left = left + 'px';

  const current = lines[li].title;

  PRESET_TITLES.forEach(label => {
    const btn = document.createElement('button');
    btn.textContent = label;
    if (current === label) btn.classList.add('active');
    btn.addEventListener('click', () => {
      lines[li].title = label;
      closeMenu();
      render();
    });
    m.appendChild(btn);
  });

  const div = document.createElement('div');
  div.className = 'menu-divider';
  m.appendChild(div);

  const customBtn = document.createElement('button');
  customBtn.textContent = 'Custom…';
  const isCustom = current !== '' && !PRESET_TITLES.slice(1).includes(current);
  if (isCustom) customBtn.classList.add('active');

  const customInput = document.createElement('input');
  customInput.className = 'menu-custom-input';
  customInput.placeholder = 'Custom name…';
  customInput.value = isCustom ? current : '';
  customInput.setAttribute('autocapitalize', 'words');
  customInput.setAttribute('autocorrect', 'off');
  customInput.setAttribute('spellcheck', 'false');

  function commitCustom() {
    const val = customInput.value.trim();
    if (val) lines[li].title = val;
    closeMenu();
    render();
  }

  customBtn.addEventListener('click', e => {
    e.stopPropagation();
    customBtn.style.display = 'none';
    customInput.style.display = 'block';
    customInput.focus();
    customInput.select();
  });
  customInput.addEventListener('click', e => e.stopPropagation());
  customInput.addEventListener('keydown', ev => {
    if (ev.key === 'Enter')  { ev.preventDefault(); commitCustom(); }
    if (ev.key === 'Escape') { closeMenu(); }
  });
  customInput.addEventListener('blur', () => setTimeout(commitCustom, 150));

  m.appendChild(customBtn);
  m.appendChild(customInput);
  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

// ── Line options menu ──────────────────────────────────────────────────────
function showLineMenu(e, li) {
  closeMenu();
  const rect = e.currentTarget.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';

  const menuW = 210;
  let left = rect.right - menuW;
  if (left < 8) left = 8;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  m.style.top  = (rect.bottom + 6) + 'px';
  m.style.left = left + 'px';

  const actions = [
    ['Add bar', () => { lines[li].bars.push(''); render(); }],
    ['Remove empty bars', () => {
      const filtered = lines[li].bars.filter(b => {
        const { content } = extractBarComponents(b);
        return content !== '' && content !== '%';
      });
      lines[li].bars = filtered.length > 0 ? filtered : [''];
      render();
    }],
    ['Clear line', () => {
      lines[li].bars = lines[li].bars.map(() => '');
      render();
    }],
    ['—'],
    ['Move line up', () => {
      if (li > 0) { [lines[li-1], lines[li]] = [lines[li], lines[li-1]]; render(); }
    }],
    ['Move line down', () => {
      if (li < lines.length - 1) { [lines[li], lines[li+1]] = [lines[li+1], lines[li]]; render(); }
    }],
    ['—'],
    ['Add line above', () => { lines.splice(li, 0, { title: '', bars: ['','','',''] }); render(); }],
    ['Add line below', () => { lines.splice(li+1, 0, { title: '', bars: ['','','',''] }); render(); }],
    ['—'],
    ['Delete line', () => {
      if (lines.length > 1) { lines.splice(li, 1); render(); }
    }, 'danger'],
  ];

  actions.forEach(([label, fn, cls]) => {
    if (label === '—') {
      const d = document.createElement('div');
      d.className = 'menu-divider';
      m.appendChild(d);
      return;
    }
    const btn = document.createElement('button');
    btn.textContent = label;
    if (cls) btn.className = cls;
    btn.addEventListener('click', () => { closeMenu(); fn(); });
    m.appendChild(btn);
  });

  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

function closeMenu() {
  if (menuState) { menuState.remove(); menuState = null; }
}
document.addEventListener('click', closeMenu);

function addLine() {
  lines.push({ title: '', bars: ['','','',''] });
  render();
}

function hasExistingData() {
  const title     = document.getElementById('m-title').value.trim();
  const composer  = document.getElementById('m-composer').value.trim();
  const feel      = document.getElementById('m-feel').value.trim();
  const key       = document.getElementById('m-key').value.trim();
  const timeSig   = document.getElementById('m-timesig').value.trim();
  const structure = document.getElementById('m-structure').value.trim();
  
  const hasMetaData = title || composer || feel || key || timeSig || structure;
  const hasBarData = lines.some(line => line.bars.some(bar => bar.trim() !== ''));
  
  return hasMetaData || hasBarData;
}

function openImportModal() {
  const backdrop = document.getElementById('import-modal-backdrop');
  const textarea = document.getElementById('import-textarea');
  const warning = document.getElementById('import-warning');
  
  backdrop.classList.add('active');

}
