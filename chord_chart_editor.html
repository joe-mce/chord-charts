<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chord Chart Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #1a1a1c;
    --bg3: #242426;
    --border: #2e2e32;
    --border2: #3e3e44;
    --text: #e8e8ea;
    --text2: #888890;
    --text3: #555560;
    --danger: #e05555;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100vh;
    padding: 14px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-bottom: 10px;
  }
  .meta-grid input {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--mono);
    width: 100%;
    outline: none;
  }
  .meta-grid input:focus { border-color: var(--border2); }
  .meta-grid input::placeholder { color: var(--text3); }

  /* Section block */
  .section-block { margin-bottom: 10px; }

  .section-header {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-bottom: 3px;
  }

  .section-title-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-right: none;
    border-radius: var(--radius) 0 0 var(--radius);
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    min-width: 52px;
    text-align: left;
    outline: none;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .section-title-btn:hover { color: var(--text); background: var(--bg2); }
  .section-title-btn.no-title { color: var(--text3); font-style: italic; }

  .section-options-btn {
    flex-shrink: 0;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 5px 9px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .section-options-btn:hover { color: var(--text); background: var(--bg2); }

  /* Lines */
  .lines-area {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .line-row {
    display: flex;
    align-items: stretch;
    width: 100%;
    min-width: 0;
  }

  .bars-container {
    display: flex;
    align-items: stretch;
    flex: 1;
    min-width: 0;
  }

  .bar-sep {
    width: 1px;
    min-width: 1px;
    background: var(--border);
    flex-shrink: 0;
    align-self: stretch;
  }

  .bar-input {
    flex: 1;
    min-width: 0;
    width: 100%;
    background: var(--bg2);
    border-top: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    border-left: none;
    border-right: none;
    padding: 8px 3px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--mono);
    text-align: center;
    outline: none;
    height: 38px;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .bar-input:focus {
    background: var(--bg3);
    border-top-color: var(--border2);
    border-bottom-color: var(--border2);
    z-index: 1;
    position: relative;
  }

  .line-options-btn {
    flex-shrink: 0;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 0 10px;
    height: 38px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .line-options-btn:hover { color: var(--text); background: var(--bg3); }

  /* Bottom buttons */
  .bottom-btns {
    display: flex;
    gap: 5px;
    margin-top: 3px;
  }

  .add-line-btn, .add-section-btn {
    flex: 1;
    background: none;
    border: 0.5px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text3);
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--sans);
    letter-spacing: 0.05em;
    transition: color 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .add-line-btn:hover, .add-section-btn:hover { color: var(--text2); border-color: var(--border2); }

  /* Output */
  .output-section { margin-top: 16px; }

  .output-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 6px;
  }

  .output-wrap {
    position: relative;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 42px 14px 14px;
  }

  .output-pre {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    white-space: pre;
    line-height: 1.75;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 7px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--border2); }

  /* Calculated key hint */
  .key-hint {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    min-height: 16px;
  }

  /* Menus */
  .menu-overlay {
    position: fixed;
    z-index: 200;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    min-width: 180px;
    overflow: hidden;
  }
  .menu-overlay button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-overlay button:hover { background: var(--bg2); }
  .menu-overlay button.danger { color: var(--danger); }
  .menu-overlay button.active { font-weight: 700; }
  .menu-divider { height: 0.5px; background: var(--border); margin: 2px 0; }

  .menu-custom-input {
    display: none;
    width: calc(100% - 28px);
    margin: 4px 14px 10px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--mono);
    outline: none;
  }
  .menu-custom-input:focus { border-color: var(--text3); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 9px 20px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--sans);
    opacity: 0;
    transition: opacity 0.16s ease, transform 0.16s ease;
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<h1>Chord Chart Editor</h1>

<div class="meta-grid">
  <input id="m-title"     placeholder="Title"     autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-composer"  placeholder="Composer"  autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-feel"      placeholder="Feel"      autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-key"       placeholder="Key"       autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-structure" placeholder="Structure" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" style="grid-column:1/-1" />
</div>

<div id="sections-area"></div>

<div class="bottom-btns">
  <button class="add-line-btn"    id="add-line-btn">+ add line</button>
  <button class="add-section-btn" onclick="addSection()">+ add section</button>
</div>

<div class="output-section">
  <div class="output-label">Output</div>
  <div class="output-wrap">
    <pre class="output-pre" id="output"></pre>
    <button class="copy-btn" onclick="copyOutput()" title="Copy">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>
  </div>
</div>
<div class="key-hint" id="key-hint"></div>
<div id="menu-portal"></div>

<script>
// Data: sections is Array<{ title: string, lines: Array<Array<string>> }>
// title === '' means no title (None)
let sections = [
  { title: 'A', lines: [['','','',''],['','','',''],['','','',''],['','','','']] }
];

let menuState = null;
let outputTimer = null;
let toastTimer = null;

// ── Chord conversions ──────────────────────────────────────────────────────
const CONVERSIONS = [
  ['maj7','Δ7'], ['m7','m7'], ['h7','ø7'], ['ø7','ø7'], ['dim7','o'],
];
function convertSymbols(s) {
  let r = s;
  CONVERSIONS.forEach(([f,t]) => { r = r.split(f).join(t); });
  return r;
}

// ── Bar formatting ─────────────────────────────────────────────────────────
function parseBarInput(raw) {
  let s = raw.trim();
  let openBar = '', closeBar = '|';
  if (s.startsWith('|:')) { openBar = '|:'; s = s.slice(2).trim(); }
  if (s.endsWith(':|'))   { closeBar = ':|'; s = s.slice(0, -2).trim(); }
  return { openBar, content: s, closeBar };
}

function layoutContent(raw, contentWidth) {
  const s = convertSymbols(raw);
  if (!s || s === '%') {
    const side = Math.floor((contentWidth - 1) / 2);
    return ' '.repeat(side) + '%' + ' '.repeat(contentWidth - side - 1);
  }
  const tokens = s.split(/\s+/).filter(Boolean);
  if (tokens.length === 1) return tokens[0].padEnd(contentWidth);
  if (tokens.length === 2) {
    const [c1, c2] = tokens;
    const pos = Math.max(c1.length + 1, Math.floor(contentWidth / 2));
    if (pos + c2.length <= contentWidth) return c1.padEnd(pos) + c2.padEnd(contentWidth - pos);
    return c1 + ' ' + c2;
  }
  const joined = tokens.join(' ');
  return joined.length <= contentWidth ? joined.padEnd(contentWidth) : joined;
}

function formatBarOutput(raw) {
  const { openBar, content, closeBar } = parseBarInput(raw);
  const cw = 9 - openBar.length - closeBar.length;
  const padded = layoutContent(content, cw);
  return (openBar === '|:' ? '|:' : '') + padded + closeBar;
}

// ── Key detection ──────────────────────────────────────────────────────────

// Map note names to semitone numbers (0=C)
const NOTE_MAP = {
  'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,
  'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11
};

// Note names for display (sharps, then fall back to flats for black keys)
const NOTE_NAMES = ['C','C#/Db','D','Eb','E','F','F#/Gb','G','Ab','A','Bb','B'];

// In a major key, the major chords sit at these semitone offsets from the root:
//   I (0), IV (5), V (7)
// The minor chords sit at:
//   ii (2), iii (4), vi (9)
// (We skip vii° as diminished)
const MAJOR_CHORD_OFFSETS = [0, 5, 7];
const MINOR_CHORD_OFFSETS = [2, 4, 9];

// Parse a raw bar value into an array of chord root+quality tokens,
// returning null for empty / % (caller handles repetition).
// Returns array of { semitone: number, isMinor: boolean } or null.
function parseChordsFromBarValue(raw) {
  const s = raw.trim();
  if (!s || s === '%') return null; // signal: repeat previous

  // Strip repeat markers
  let content = s;
  if (content.startsWith('|:')) content = content.slice(2).trim();
  if (content.endsWith(':|'))   content = content.slice(0, -2).trim();
  // strip slash-bass: "Gm7/F" -> "Gm7", "/F" -> ignore (pure bass note)
  const tokens = content.split(/\s+/).filter(Boolean);

  const result = [];
  for (let tok of tokens) {
    // strip slash-bass
    const slashIdx = tok.indexOf('/');
    if (slashIdx !== -1) tok = tok.slice(0, slashIdx);
    if (!tok) continue;

    // Parse note name (1 or 2 chars)
    let noteName = '';
    if (tok.length >= 2 && (tok[1] === '#' || tok[1] === 'b')) {
      noteName = tok.slice(0, 2);
    } else {
      noteName = tok.slice(0, 1);
    }
    const semitone = NOTE_MAP[noteName];
    if (semitone === undefined) continue; // unrecognised note

    const suffix = tok.slice(noteName.length); // everything after root note

    // Determine if minor
    const isMinor = suffix.startsWith('m') && !/^maj/i.test(suffix);

    // Exclude: purely dominant/extended chords with no minor prefix
    // Excluded: X7, X9, X11, X13, Xø at the start of suffix
    // (Xm7, Xm9 etc are NOT excluded — caught by isMinor above)
    if (!isMinor) {
      // Check if it's a dominant/half-dim that should be excluded
      if (/^(7|9|11|13|ø)/.test(suffix)) continue;
    }

    result.push({ semitone, isMinor });
  }
  return result.length > 0 ? result : [];
}

// Walk all sections/lines/bars, resolve % repeats, accumulate weighted chord counts.
// Returns Map<string, number> where key is e.g. "0:maj" or "9:min", value is bar-weight.
function gatherChordWeights() {
  const weights = new Map();
  let prevChords = []; // chords from the last non-empty, non-% bar

  for (const sec of sections) {
    for (const bars of sec.lines) {
      for (const raw of bars) {
        const parsed = parseChordsFromBarValue(raw);
        let chords;
        if (parsed === null) {
          // empty or % — repeat previous
          chords = prevChords;
        } else {
          chords = parsed;
          if (chords.length > 0) prevChords = chords;
        }
        // Each chord in this bar shares the bar's weight equally
        const weight = chords.length > 0 ? 1 / chords.length : 0;
        for (const { semitone, isMinor } of chords) {
          const key = semitone + ':' + (isMinor ? 'min' : 'maj');
          weights.set(key, (weights.get(key) || 0) + weight);
        }
      }
    }
  }
  return weights;
}

function guessKey(weights) {
  // Count distinct chords (regardless of weight) for threshold check
  let distinctCount = 0;
  for (const [, w] of weights) { if (w > 0) distinctCount++; }
  if (distinctCount < 2) return null;

  // Score each of the 12 major keys
  let bestScore = -1;
  let bestRoot  = -1;

  for (let root = 0; root < 12; root++) {
    let score = 0;
    for (const offset of MAJOR_CHORD_OFFSETS) {
      const k = ((root + offset) % 12) + ':maj';
      score += (weights.get(k) || 0);
    }
    for (const offset of MINOR_CHORD_OFFSETS) {
      const k = ((root + offset) % 12) + ':min';
      score += (weights.get(k) || 0);
    }
    if (score > bestScore) { bestScore = score; bestRoot = root; }
  }

  if (bestScore === 0) return null;
  return bestRoot;
}

function updateKeyHint() {
  const el = document.getElementById('key-hint');
  const weights = gatherChordWeights();
  const root = guessKey(weights);
  if (root === null) { el.textContent = ''; return; }
  // Relative minor is 9 semitones above (= 3 semitones below) the major root
  const minorRoot = (root + 9) % 12;
  el.textContent = 'Calculated key: ' + NOTE_NAMES[root] + ' major / ' + NOTE_NAMES[minorRoot] + ' minor';
}

// ── Output builder ─────────────────────────────────────────────────────────
function buildOutput() {
  const title     = document.getElementById('m-title').value.trim();
  const composer  = document.getElementById('m-composer').value.trim();
  const feel      = document.getElementById('m-feel').value.trim();
  const key       = document.getElementById('m-key').value.trim();
  const structure = document.getElementById('m-structure').value.trim();

  let out = '';
  const composerPart = composer ? '(' + composer + ')' : '';
  const titleLine = [title, composerPart].filter(Boolean).join(' ');
  const feelLine  = [feel, key].filter(Boolean).join(', ');
  if (titleLine)  out += titleLine  + '\n';
  if (feelLine)   out += feelLine   + '\n';
  if (structure)  out += structure  + '\n';

  sections.forEach(sec => {
    out += '\n';
    if (sec.title) out += '[' + sec.title + ']\n';
    sec.lines.forEach(bars => {
      out += bars.map(formatBarOutput).join('') + '\n';
    });
  });

  document.getElementById('output').textContent = out.trimEnd();
  updateKeyHint();
}

function scheduleOutput() {
  clearTimeout(outputTimer);
  outputTimer = setTimeout(buildOutput, 280);
}

// ── Preset titles ──────────────────────────────────────────────────────────
const PRESET_TITLES = ['None','A','B','C','D','Intro','Verse','Chorus','Solos','Riff','Outro'];

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const area = document.getElementById('sections-area');
  area.innerHTML = '';

  sections.forEach((sec, si) => {
    const block = document.createElement('div');
    block.className = 'section-block';

    // Header
    const header = document.createElement('div');
    header.className = 'section-header';

    const titleBtn = document.createElement('button');
    titleBtn.className = 'section-title-btn' + (sec.title ? '' : ' no-title');
    titleBtn.textContent = sec.title || 'none';
    titleBtn.setAttribute('tabindex', '-1');
    titleBtn.addEventListener('click', e => { e.stopPropagation(); showTitleMenu(e, si); });

    const optBtn = document.createElement('button');
    optBtn.className = 'section-options-btn';
    optBtn.setAttribute('tabindex', '-1');
    optBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>`;
    optBtn.addEventListener('click', e => { e.stopPropagation(); showSectionMenu(e, si); });

    header.appendChild(titleBtn);
    header.appendChild(optBtn);
    block.appendChild(header);

    // Lines
    const linesArea = document.createElement('div');
    linesArea.className = 'lines-area';

    sec.lines.forEach((bars, li) => {
      const row = document.createElement('div');
      row.className = 'line-row';

      const outerWrap = document.createElement('div');
      outerWrap.style.cssText = 'display:flex;align-items:stretch;flex:1;min-width:0;border:0.5px solid var(--border);border-right:none;border-radius:6px 0 0 6px;overflow:hidden';

      const barsContainer = document.createElement('div');
      barsContainer.className = 'bars-container';

      bars.forEach((val, bi) => {
        const inp = document.createElement('input');
        inp.className = 'bar-input';
        inp.value = val;
        inp.setAttribute('autocomplete', 'off');
        inp.setAttribute('autocorrect',  'off');
        inp.setAttribute('autocapitalize', 'words');
        inp.setAttribute('spellcheck',   'false');
        inp.addEventListener('input', e => {
          sections[si].lines[li][bi] = e.target.value;
          scheduleOutput();
        });
        barsContainer.appendChild(inp);

        const sep = document.createElement('div');
        sep.className = 'bar-sep';
        barsContainer.appendChild(sep);
      });

      outerWrap.appendChild(barsContainer);

      const lineOptBtn = document.createElement('button');
      lineOptBtn.className = 'line-options-btn';
      lineOptBtn.setAttribute('tabindex', '-1');
      lineOptBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>`;
      lineOptBtn.addEventListener('click', e => { e.stopPropagation(); showLineMenu(e, si, li); });

      row.appendChild(outerWrap);
      row.appendChild(lineOptBtn);
      linesArea.appendChild(row);
    });

    block.appendChild(linesArea);
    area.appendChild(block);
  });

  // "Add line" always appends to the last section
  document.getElementById('add-line-btn').onclick = () => {
    sections[sections.length - 1].lines.push(['','','','']);
    render();
  };

  buildOutput();
}

// ── Title picker menu ──────────────────────────────────────────────────────
function showTitleMenu(e, si) {
  closeMenu();
  const rect = e.currentTarget.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';
  m.style.minWidth = '160px';

  let left = rect.left;
  const menuW = 170;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  if (left < 8) left = 8;
  m.style.top  = (rect.bottom + 4) + 'px';
  m.style.left = left + 'px';

  const current = sections[si].title;

  // Preset items
  PRESET_TITLES.forEach(label => {
    const value = label === 'None' ? '' : label;
    const btn = document.createElement('button');
    btn.textContent = label;
    if (current === value) btn.classList.add('active');
    btn.addEventListener('click', () => {
      sections[si].title = value;
      closeMenu();
      render();
    });
    m.appendChild(btn);
  });

  // Divider + Custom
  const div = document.createElement('div');
  div.className = 'menu-divider';
  m.appendChild(div);

  const customBtn = document.createElement('button');
  customBtn.textContent = 'Custom…';
  // If current title is a custom one (not in presets), mark it active
  const isCustom = current !== '' && !PRESET_TITLES.slice(1).includes(current);
  if (isCustom) customBtn.classList.add('active');

  const customInput = document.createElement('input');
  customInput.className = 'menu-custom-input';
  customInput.placeholder = 'Custom name…';
  customInput.value = isCustom ? current : '';
  customInput.setAttribute('autocapitalize', 'words');
  customInput.setAttribute('autocorrect', 'off');
  customInput.setAttribute('spellcheck', 'false');

  function commitCustom() {
    const val = customInput.value.trim();
    if (val) { sections[si].title = val; }
    closeMenu();
    render();
  }

  customBtn.addEventListener('click', e => {
    e.stopPropagation();
    customBtn.style.display = 'none';
    customInput.style.display = 'block';
    customInput.focus();
    customInput.select();
  });
  customInput.addEventListener('click', e => e.stopPropagation());
  customInput.addEventListener('keydown', ev => {
    if (ev.key === 'Enter')  { ev.preventDefault(); commitCustom(); }
    if (ev.key === 'Escape') { closeMenu(); }
  });
  customInput.addEventListener('blur', () => {
    setTimeout(commitCustom, 150);
  });

  m.appendChild(customBtn);
  m.appendChild(customInput);

  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

// ── Section options menu ───────────────────────────────────────────────────
function showSectionMenu(e, si) {
  closeMenu();
  const rect = e.currentTarget.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';

  const menuW = 210;
  let left = rect.right - menuW;
  if (left < 8) left = 8;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  m.style.top  = (rect.bottom + 6) + 'px';
  m.style.left = left + 'px';

  const actions = [
    ['Duplicate section', () => {
      sections.splice(si + 1, 0, JSON.parse(JSON.stringify(sections[si])));
      render();
    }],
    ['Move section up', () => {
      if (si > 0) { [sections[si-1], sections[si]] = [sections[si], sections[si-1]]; render(); }
    }],
    ['Move section down', () => {
      if (si < sections.length - 1) { [sections[si], sections[si+1]] = [sections[si+1], sections[si]]; render(); }
    }],
    ['—'],
    ['Delete section', () => {
      if (sections.length > 1) { sections.splice(si, 1); render(); }
    }, 'danger'],
  ];

  actions.forEach(([label, fn, cls]) => {
    if (label === '—') { const d = document.createElement('div'); d.className = 'menu-divider'; m.appendChild(d); return; }
    const btn = document.createElement('button');
    btn.textContent = label;
    if (cls) btn.className = cls;
    btn.addEventListener('click', () => { closeMenu(); fn(); });
    m.appendChild(btn);
  });

  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

// ── Line options menu ──────────────────────────────────────────────────────
function showLineMenu(e, si, li) {
  closeMenu();
  const rect = e.currentTarget.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';

  const menuW = 210;
  let left = rect.right - menuW;
  if (left < 8) left = 8;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  m.style.top  = (rect.bottom + 6) + 'px';
  m.style.left = left + 'px';

  const actions = [
    ['Add bar', () => { sections[si].lines[li].push(''); render(); }],
    ['Remove empty bars', () => {
      const filtered = sections[si].lines[li].filter(b => {
        const { content } = parseBarInput(b);
        return content !== '' && content !== '%';
      });
      sections[si].lines[li] = filtered.length > 0 ? filtered : [''];
      render();
    }],
    ['Clear line', () => {
      sections[si].lines[li] = sections[si].lines[li].map(() => '');
      render();
    }],
    ['—'],
    ['Add line above', () => { sections[si].lines.splice(li, 0, ['','','','']); render(); }],
    ['Add line below', () => { sections[si].lines.splice(li+1, 0, ['','','','']); render(); }],
    ['—'],
    ['Delete line', () => {
      if (sections[si].lines.length > 1) {
        sections[si].lines.splice(li, 1);
      } else if (sections.length > 1) {
        sections.splice(si, 1);
      }
      render();
    }, 'danger'],
  ];

  actions.forEach(([label, fn, cls]) => {
    if (label === '—') { const d = document.createElement('div'); d.className = 'menu-divider'; m.appendChild(d); return; }
    const btn = document.createElement('button');
    btn.textContent = label;
    if (cls) btn.className = cls;
    btn.addEventListener('click', () => { closeMenu(); fn(); });
    m.appendChild(btn);
  });

  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

function closeMenu() {
  if (menuState) { menuState.remove(); menuState = null; }
}
document.addEventListener('click', closeMenu);

// ── Add section ────────────────────────────────────────────────────────────
function addSection() {
  const letters = ['A','B','C','D'];
  // Find the highest letter used anywhere in the song
  let highestIdx = -1;
  sections.forEach(sec => {
    const idx = letters.indexOf(sec.title);
    if (idx > highestIdx) highestIdx = idx;
  });
  const newTitle = highestIdx >= 0 && highestIdx < letters.length - 1
    ? letters[highestIdx + 1]
    : '';
  sections.push({ title: newTitle, lines: [['','','',''],['','','',''],['','','',''],['','','','']] });
  render();
}

// ── Toast & copy ───────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').textContent)
    .then(() => showToast('Copied to clipboard'))
    .catch(() => showToast('Copy failed'));
}

['m-title','m-composer','m-feel','m-key','m-structure'].forEach(id => {
  document.getElementById(id).addEventListener('input', scheduleOutput);
});

render();
</script>
