}

function parseChordChart(text) {
  const lines_text = text.split('\n');
  let idx = 0;
  
  // Parse header
  let title = '';
  let composer = '';
  let feel = '';
  let key = '';
  let structure = '';
  
  // Check first line for title (with optional composer)
  if (idx < lines_text.length && lines_text[idx].trim() !== '' && !lines_text[idx].trim().startsWith('[')) {
    const firstLine = lines_text[idx].trim();
    const composerMatch = firstLine.match(/^(.*?)\s*\((.*?)\)\s*$/);
    if (composerMatch) {
      title = composerMatch[1].trim();
      composer = composerMatch[2].trim();
    } else {
      title = firstLine;
    }
    idx++;
  }
  
  let timeSig = '';

  // Check second line for Feel/Key/TimeSig
  if (idx < lines_text.length && lines_text[idx].trim() !== '' && !lines_text[idx].trim().startsWith('[')) {
    const secondLine = lines_text[idx].trim();

    // Extract time signature e.g. 4/4, 3/4, 6/8
    const timeSigMatch = secondLine.match(/\b(\d+\/\d+)\b/);
    let remaining = secondLine;
    if (timeSigMatch) {
      timeSig = timeSigMatch[1];
      remaining = remaining.replace(timeSigMatch[0], '').trim();
    }

    // Extract key: (A-G)(b#)? (major|minor)
    const keyMatch = remaining.match(/([A-G]#?b?)\s+(major|minor)/i);
    if (keyMatch) {
      key = keyMatch[0];
      remaining = remaining.replace(keyMatch[0], '').trim();
    }

    // Whatever's left — strip stray commas (leading, trailing, consecutive) and spaces
    feel = remaining.replace(/,\s*,+/g, ',').replace(/^[\s,]+|[\s,]+$/g, '').trim();
    idx++;
  }
  
  // Check third line for Structure
  if (idx < lines_text.length && lines_text[idx].trim() !== '' && !lines_text[idx].trim().startsWith('[')) {
    structure = lines_text[idx].trim();
    idx++;
  }
  
  // Parse bars and sections
  const newLines = [];
  let currentTitle = '';
  
  while (idx < lines_text.length) {
    const line = lines_text[idx];
    idx++;
    
    // Check for section header
    if (line.trim().match(/^\[.*\]$/)) {
      currentTitle = line.trim().slice(1, -1); // Remove brackets
      continue;
    }
    
    // Empty line or whitespace-only line
    if (line.trim() === '') {
      continue;
    }
    
    // Parse bar line
    const bars = parseBarLine(line);
    if (bars.length > 0) {
      newLines.push({ title: currentTitle, bars: bars });
      currentTitle = ''; // Only apply title to first line after section header
    }
  }
  
  // If no bars were found, create at least one empty line
  if (newLines.length === 0) {
    newLines.push({ title: '', bars: [''] });
  }
  
  return {
    title,
    composer,
    feel,
    key,
    timeSig,
    structure,
    lines: newLines
  };
}

function parseBarLine(line) {
  // Split on | to get segments
  let segments = line.split('|');

  // Remove trailing empty string from the final |
  if (segments.length > 0 && segments[segments.length - 1] === '') {
    segments.pop();
  }

  if (segments.length === 0) return [];

  const bars = [];
  let pendingNthTime = null;   // digit to prepend to the next bar
  let hasNthTimeGt1 = false;   // whether any 2nd-or-higher time ending exists
  let startIdx = 0;
  let openRepeatPending = false;

  // Handle special first segment
  const firstSeg = segments[0];

  if (firstSeg === '') {
    // Line starts with | — must be |: (opening repeat) or nth-time initial barline
    openRepeatPending = true;
    startIdx = 1;
  } else if (/^\s*\d\s*$/.test(firstSeg)) {
    // First segment is only a digit: nth-time initial on bar 1
    const digit = firstSeg.trim();
    pendingNthTime = digit;
    if (parseInt(digit) > 1) hasNthTimeGt1 = true;
    startIdx = 1;
  }

  // Process segments
  for (let i = startIdx; i < segments.length; i++) {
    const seg = segments[i];

    // Empty non-trailing segment = double barline after previous bar
    if (seg === '' && bars.length > 0) {
      bars[bars.length - 1] = bars[bars.length - 1].trim() + ' ||';
      continue;
    }
    if (seg === '') continue;

    let content = seg;
    let prefix = '';
    let suffix = '';

    // Handle opening repeat prefix from previous empty segment
    if (openRepeatPending) {
      if (content.trimStart().startsWith(':')) {
        prefix = '|:';
        content = content.trimStart().slice(1);
      }
      openRepeatPending = false;
    }

    // Check if ends with : (closing repeat — the | was the split delimiter)
    if (content.trimEnd().endsWith(':')) {
      content = content.trimEnd().slice(0, -1);
      suffix = ' :|';
    }

    // Check if ends with space + digit (nth-time marker for the next bar)
    // Use / \d$/ to avoid mistaking chord tones like G7 for nth-time markers
    let nextPending = null;
    if (/ \d$/.test(content.trimEnd())) {
      nextPending = content.trimEnd().slice(-1);
      content = content.trimEnd().slice(0, -2); // strip the space + digit
    }

    // Trim and convert % to empty string (editor stores empty bars as '')
    const chordContent = content.trim();
    const normalized = chordContent === '%' ? '' : chordContent;

    // Build the bar string
    let barStr = prefix;
    if (pendingNthTime !== null) {
      barStr += pendingNthTime + (normalized ? ' ' + normalized : '') + suffix;
      if (parseInt(pendingNthTime) > 1) hasNthTimeGt1 = true;
    } else {
      barStr += normalized + suffix;
    }

    bars.push(barStr);
    pendingNthTime = nextPending;
  }

  // Left-pad with empty bars to 4 when the line has nth-time ending > 1
  if (hasNthTimeGt1) {
    while (bars.length < 4) bars.unshift('');
  }

  return bars;
}

function performImport() {
  const textarea = document.getElementById('import-textarea');
  const text = textarea.value.trim();
  
  if (!text) {
    showToast('Please paste a chord chart');
    return;
  }
  
  try {
    const parsed = parseChordChart(text);
    
    // Clear all existing data
    document.getElementById('m-title').value = parsed.title;
    document.getElementById('m-composer').value = parsed.composer;
    document.getElementById('m-feel').value = parsed.feel;
    document.getElementById('m-key').value = parsed.key;
    document.getElementById('m-timesig').value = parsed.timeSig;
    document.getElementById('m-structure').value = parsed.structure;
    
    lines = parsed.lines;
    
    closeImportModal();
    render();
    showToast('Imported successfully');
  } catch (err) {
    console.error('Import error:', err);
    showToast('Error importing chart');
  }
}

// Menu button and modal event listeners
document.getElementById('menu-btn').addEventListener('click', openImportModal);
document.getElementById('import-cancel-btn').addEventListener('click', closeImportModal);
document.getElementById('import-submit-btn').addEventListener('click', performImport);

// Close modal on backdrop click
document.getElementById('import-modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'import-modal-backdrop') {
    closeImportModal();
  }
});

// Close on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('import-modal-backdrop').classList.contains('active')) {
    closeImportModal();
  }
});

['m-title','m-composer','m-feel','m-key','m-timesig','m-structure'].forEach(id => {
  document.getElementById(id).addEventListener('input', scheduleOutput);
});

// Hide pills when key input is focused; restore on blur
const keyInput = document.getElementById('m-key');
keyInput.addEventListener('focus', () => updateKeyPills());
keyInput.addEventListener('blur',  () => setTimeout(updateKeyPills, 50));
keyInput.addEventListener('input', () => updateKeyPills());

render();

// Pre-populate fields from URL query parameters (e.g. ?title=Moonglow)
const urlParams = new URLSearchParams(window.location.search);
const paramTitle = urlParams.get('title');
if (paramTitle) {
  document.getElementById('m-title').value = paramTitle;
  scheduleOutput();
}
</script>
</body>
</html>
