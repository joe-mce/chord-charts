<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chord Chart Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #1a1a1c;
    --bg3: #242426;
    --border: #2e2e32;
    --border2: #3e3e44;
    --text: #e8e8ea;
    --text2: #888890;
    --text3: #555560;
    --danger: #e05555;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 6px;
    --left-gutter: 28px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100vh;
    padding: 14px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-bottom: 10px;
  }
  .meta-grid input {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--mono);
    width: 100%;
    outline: none;
  }
  .meta-grid input:focus { border-color: var(--border2); }
  .meta-grid input::placeholder { color: var(--text3); }

  /* Select mode toolbar */
  .select-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 5px;
    margin-bottom: 6px;
  }
  .select-toggle-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--sans);
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.04em;
    transition: color 0.1s, background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    white-space: nowrap;
  }
  .select-toggle-btn:hover { color: var(--text2); border-color: var(--border2); }
  .select-toggle-btn.active { background: #2a2a40; border-color: #5555aa; color: #aaaaee; }

  .select-actions-btn {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--sans);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.04em;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .select-actions-btn:hover { background: var(--bg2); color: var(--text); }

  /* Lines area */
  .lines-area {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 8px;
  }

  /* Each line-block: optional title row + bar row */
  .line-block { display: flex; flex-direction: column; gap: 2px; }

  /* Title row — flush left, no gutter indent */
  .title-row {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .section-title-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-right: none;
    border-radius: var(--radius) 0 0 var(--radius);
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    text-align: left;
    outline: none;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .section-title-btn:hover { color: var(--text); background: var(--bg2); }
  .section-title-remove-btn {
    flex-shrink: 0;
    background: none;
    border: 0.5px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 0 8px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    line-height: 1;
    align-self: stretch;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .section-title-remove-btn:hover { color: var(--danger); background: var(--bg2); }

  /* Bar row */
  .bar-row {
    display: flex;
    align-items: stretch;
    width: 100%;
    min-width: 0;
  }

  /* Left gutter */
  .line-gutter {
    width: var(--left-gutter);
    min-width: var(--left-gutter);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-title-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    opacity: 1;
  }
  .add-title-btn:hover { color: var(--text2); background: var(--bg2); }

  .bars-container {
    display: flex;
    align-items: stretch;
    flex: 1;
    min-width: 0;
  }
  .bar-sep {
    width: 1px;
    min-width: 1px;
    background: var(--border);
    flex-shrink: 0;
    align-self: stretch;
  }
  .bar-input {
    flex: 1;
    min-width: 0;
    width: 100%;
    background: var(--bg2);
    border-top: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    border-left: none;
    border-right: none;
    padding: 8px 3px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--mono);
    text-align: center;
    outline: none;
    height: 38px;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .bar-input:focus {
    background: var(--bg3);
    border-top-color: var(--border2);
    border-bottom-color: var(--border2);
    z-index: 1;
    position: relative;
  }
  .bar-input.bar-selected {
    background: #1e1e38 !important;
    border-top-color: #5555aa !important;
    border-bottom-color: #5555aa !important;
    color: #ccccff !important;
    z-index: 1;
    position: relative;
  }
  body.select-mode .bar-input { cursor: pointer; caret-color: transparent; }
  body.select-mode .bar-input::selection { background: transparent; }

  .line-options-btn {
    flex-shrink: 0;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 0 10px;
    height: 38px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .line-options-btn:hover { color: var(--text); background: var(--bg3); }

  /* Add line button */
  .add-line-btn {
    background: none;
    border: 0.5px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text3);
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    font-family: var(--sans);
    letter-spacing: 0.05em;
    transition: color 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 8px;
  }
  .add-line-btn:hover { color: var(--text2); border-color: var(--border2); }

  /* Output */
  .output-section { margin-top: 16px; }
  .output-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 6px;
  }
  .output-wrap {
    position: relative;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 80px 14px 14px;
  }
  .output-pre {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    white-space: pre;
    line-height: 1.75;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 7px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--border2); }

  .output-menu-btn {
    position: absolute;
    top: 10px;
    right: 46px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 7px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .output-menu-btn:hover { color: var(--text); border-color: var(--border2); }

  /* Key suggestion pills — sit inside the key input on the RHS */
  .key-pill {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 4px 9px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
    cursor: pointer;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    line-height: 1;
  }
  .key-pill:hover { color: var(--text); background: var(--border2); }

  /* Menus */
  .menu-overlay {
    position: fixed;
    z-index: 200;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    min-width: 180px;
    overflow: hidden;
  }
  .menu-overlay button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-overlay button:hover { background: var(--bg2); }
  .menu-overlay button.danger { color: var(--danger); }
  .menu-overlay button.active { font-weight: 700; }
  .menu-divider { height: 0.5px; background: var(--border); margin: 2px 0; }
  .menu-custom-input {
    display: none;
    width: calc(100% - 28px);
    margin: 4px 14px 10px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--mono);
    outline: none;
  }
  .menu-custom-input:focus { border-color: var(--text3); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 9px 20px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--sans);
    opacity: 0;
    transition: opacity 0.16s ease, transform 0.16s ease;
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Menu button */
  .menu-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 8px;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    transition: color 0.1s, background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    outline: none;
  }
  .menu-btn:hover { color: var(--text2); border-color: var(--border2); }

  /* Import modal */
  .import-modal-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 14px;
  }

  .import-modal-backdrop.active {
    display: flex;
  }

  .import-modal {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .import-modal h2 {
    font-size: 16px;
    color: var(--text);
    margin: 0;
    font-weight: 500;
  }

  .import-modal textarea {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text);
    outline: none;
    resize: vertical;
    flex: 1;
    min-height: 200px;
  }

  .import-modal textarea:focus {
    border-color: var(--border2);
  }

  .import-modal textarea::placeholder {
    color: var(--text3);
  }

  .import-modal-buttons {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .import-modal-buttons button {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: color 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }

  .import-modal-buttons button:hover {
    background: var(--bg2);
    color: var(--text);
  }

  .import-modal-buttons button.primary {
    background: #2a2a50;
    border-color: #5555aa;
    color: #aaaaee;
  }

  .import-modal-buttons button.primary:hover {
    background: #333360;
    color: #bbbbff;
  }

  .import-warning {
    background: rgba(224, 85, 85, 0.1);
    border: 0.5px solid rgba(224, 85, 85, 0.3);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 12px;
    color: #ff9999;
    line-height: 1.4;
  }
</style>
</head>
<body>

<h1 style="display: flex; justify-content: space-between; align-items: center;">
  Chord Chart Editor
  <button class="menu-btn" id="menu-btn" title="Menu">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</h1>

<div class="meta-grid">
  <input id="m-title"     placeholder="Title"     autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-composer"  placeholder="Composer"  autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <input id="m-feel"      placeholder="Feel"      autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <div style="position:relative;min-width:0;">
    <input id="m-key" placeholder="Key" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" style="width:100%;padding-right:70px" />
    <div id="key-pills-row" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);display:flex;gap:4px;pointer-events:auto;"></div>
  </div>
  <input id="m-structure" placeholder="Structure" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" style="grid-column:1/-1" />
</div>

<div class="select-toolbar" id="select-toolbar">
  <div id="select-actions-wrap" style="display:none">
    <button class="select-actions-btn" id="select-actions-btn" onclick="showSelectionMenu(event)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      <span id="select-count">0</span> selected
    </button>
  </div>
  <button class="select-toggle-btn" id="select-toggle-btn" onclick="toggleSelectMode()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1" opacity="0.4"/><rect x="3" y="14" width="7" height="7" rx="1" opacity="0.4"/><rect x="14" y="14" width="7" height="7" rx="1" opacity="0.4"/></svg>
    Select
  </button>
</div>

<div class="lines-area" id="lines-area"></div>
<button class="add-line-btn" id="add-line-btn" onclick="addLine()">+ add line</button>

<div class="output-section">
  <div class="output-label">Output</div>
  <div class="output-wrap">
    <pre class="output-pre" id="output"></pre>
    <button class="output-menu-btn" id="output-menu-btn" onclick="showOutputMenu(event)" title="More options">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>
    </button>
    <button class="copy-btn" onclick="copyOutput()" title="Copy">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="menu-portal"></div>

<div class="import-modal-backdrop" id="import-modal-backdrop">
  <div class="import-modal">
    <h2>Import Plain Text Chord Chart</h2>
    <div id="import-warning"></div>
    <textarea id="import-textarea" placeholder="Paste your chord chart here..."></textarea>
    <div class="import-modal-buttons">
      <button id="import-cancel-btn">Cancel</button>
      <button class="primary" id="import-submit-btn">Import</button>
    </div>
  </div>
</div>

<script>
// ── Data model ─────────────────────────────────────────────────────────────
// lines: Array<{ title: string, bars: Array<string> }>
// title === '' means no section title on this line
let lines = [
  { title: 'A', bars: ['','','',''] },
  { title: '',  bars: ['','','',''] },
  { title: '',  bars: ['','','',''] },
  { title: '',  bars: ['','','',''] },
];

let menuState = null;
let outputTimer = null;
let toastTimer = null;

// ── Chord conversions ──────────────────────────────────────────────────────
const CONVERSIONS = [
  ['maj7','Δ7'], ['m7','m7'], ['h7','ø7'], ['ø7','ø7'], ['dim7','o'],
];
function convertSymbols(s) {
  let r = s;
  CONVERSIONS.forEach(([f,t]) => { r = r.split(f).join(t); });
  return r;
}

// ── Bar formatting ─────────────────────────────────────────────────────────
function parseBarInput(raw) {
  let s = raw.trim();
  let openBar = '', closeBar = '|';
  if (s.startsWith('|:')) { openBar = '|:'; s = s.slice(2).trim(); }
  if (s.endsWith(':|'))   { closeBar = ':|'; s = s.slice(0, -2).trim(); }
  return { openBar, content: s, closeBar };
}

function layoutContent(raw, contentWidth) {
  const s = convertSymbols(raw);
  if (!s || s === '%') {
    const side = Math.floor((contentWidth - 1) / 2);
    return ' '.repeat(side) + '%' + ' '.repeat(contentWidth - side - 1);
  }
  const tokens = s.split(/\s+/).filter(Boolean);
  if (tokens.length === 1) return tokens[0].padEnd(contentWidth);
  if (tokens.length === 2) {
    const [c1, c2] = tokens;
    const pos = Math.max(c1.length + 1, Math.floor(contentWidth / 2));
    if (pos + c2.length <= contentWidth) return c1.padEnd(pos) + c2.padEnd(contentWidth - pos);
    return c1 + ' ' + c2;
  }
  const joined = tokens.join(' ');
  return joined.length <= contentWidth ? joined.padEnd(contentWidth) : joined;
}

function formatBarOutput(raw) {
  const { openBar, content, closeBar } = parseBarInput(raw);
  const cw = 9 - openBar.length - closeBar.length;
  const padded = layoutContent(content, cw);
  return (openBar === '|:' ? '|:' : '') + padded + closeBar;
}

// ── Key detection ──────────────────────────────────────────────────────────
const NOTE_MAP = {
  'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,
  'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11
};
const MAJOR_KEY_NAMES = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const MINOR_KEY_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','Bb','B'];
const MAJOR_CHORD_OFFSETS = [0, 5];
const MINOR_CHORD_OFFSETS = [2, 4, 9];
const DOMINANT_OFFSET = 7;
const HALFDIM_OFFSET  = 11;

function parseChordsFromBarValue(raw) {
  const s = raw.trim();
  if (!s || s === '%') return null;
  let content = s;
  if (content.startsWith('|:')) content = content.slice(2).trim();
  if (content.endsWith(':|'))   content = content.slice(0, -2).trim();
  const tokens = content.split(/\s+/).filter(Boolean);
  const result = [];
  for (let tok of tokens) {
    const si = tok.indexOf('/'); if (si !== -1) tok = tok.slice(0, si);
    if (!tok) continue;
    let noteName = (tok.length >= 2 && (tok[1]==='#'||tok[1]==='b')) ? tok.slice(0,2) : tok.slice(0,1);
    const semitone = NOTE_MAP[noteName];
    if (semitone === undefined) continue;
    const suffix = tok.slice(noteName.length);
    if (/^(ø|h7)/.test(suffix)) { result.push({ semitone, quality: 'hdim' }); continue; }
    const isMinor = suffix.startsWith('m') && !/^maj/i.test(suffix);
    if (isMinor) result.push({ semitone, quality: 'min' });
    else if (/^(7|9|11|13)/.test(suffix)) result.push({ semitone, quality: 'dom' });
    else result.push({ semitone, quality: 'maj' });
  }
  return result.length > 0 ? result : [];
}

function gatherChordWeights() {
  const weights = new Map();
  let prevChords = [];
  for (const line of lines) {
    for (const raw of line.bars) {
      const parsed = parseChordsFromBarValue(raw);
      let chords = parsed === null ? prevChords : parsed;
      if (parsed !== null && chords.length > 0) prevChords = chords;
      const weight = chords.length > 0 ? 1 / chords.length : 0;
      for (const { semitone, quality } of chords) {
        const k = semitone + ':' + quality;
        weights.set(k, (weights.get(k) || 0) + weight);
      }
    }
  }
  return weights;
}

function guessKey(weights) {
  let d = 0; for (const [,w] of weights) if (w > 0) d++;
  if (d < 2) return null;
  let bestScore = -1, bestRoot = -1;
  for (let root = 0; root < 12; root++) {
    let score = 0;
    for (const o of MAJOR_CHORD_OFFSETS) score += weights.get(((root+o)%12)+':maj') || 0;
    for (const o of MINOR_CHORD_OFFSETS) score += weights.get(((root+o)%12)+':min') || 0;
    score += weights.get(((root+DOMINANT_OFFSET)%12)+':dom')   || 0;
    score += weights.get(((root+HALFDIM_OFFSET) %12)+':hdim')  || 0;
    if (score > bestScore) { bestScore = score; bestRoot = root; }
  }
  return bestScore === 0 ? null : bestRoot;
}

function updateKeyPills() {
  const row = document.getElementById('key-pills-row');
  const keyInput = document.getElementById('m-key');

  // Hide when focused or has any value
  if (document.activeElement === keyInput || keyInput.value.trim() !== '') {
    row.innerHTML = '';
    return;
  }

  const root = guessKey(gatherChordWeights());
  if (root === null) { row.innerHTML = ''; return; }

  const minorRoot  = (root + 9) % 12;
  const majorFull  = MAJOR_KEY_NAMES[root] + ' major';
  const minorFull  = MINOR_KEY_NAMES[minorRoot] + ' minor';
  const majorShort = MAJOR_KEY_NAMES[root];
  const minorShort = MINOR_KEY_NAMES[minorRoot] + 'm';

  row.innerHTML = '';
  [[majorShort, majorFull], [minorShort, minorFull]].forEach(([short, full]) => {
    const pill = document.createElement('button');
    pill.className = 'key-pill';
    pill.textContent = short;
    pill.title = full;
    pill.addEventListener('mousedown', e => {
      e.preventDefault();
      keyInput.value = full;
      keyInput.dispatchEvent(new Event('input'));
      row.innerHTML = '';
    });
    pill.addEventListener('touchend', e => {
      e.preventDefault();
      keyInput.value = full;
      keyInput.dispatchEvent(new Event('input'));
      row.innerHTML = '';
    });
    row.appendChild(pill);
  });
}

// ── Output builder ─────────────────────────────────────────────────────────
function buildOutput() {
  const title     = document.getElementById('m-title').value.trim();
  const composer  = document.getElementById('m-composer').value.trim();
  const feel      = document.getElementById('m-feel').value.trim();
  const key       = document.getElementById('m-key').value.trim();
  const structure = document.getElementById('m-structure').value.trim();

  let out = '';
  const composerPart = composer ? '(' + composer + ')' : '';
  const titleLine = [title, composerPart].filter(Boolean).join(' ');
  const feelLine  = [feel, key].filter(Boolean).join(', ');
  if (titleLine)  out += titleLine  + '\n';
  if (feelLine)   out += feelLine   + '\n';
  if (structure)  out += structure  + '\n';

  lines.forEach(line => {
    if (line.title) {
      out += '\n[' + line.title + ']\n';
    }
    out += line.bars.map(formatBarOutput).join('') + '\n';
  });

  document.getElementById('output').textContent = out.trim();
  updateKeyPills();
}

function scheduleOutput() {
  clearTimeout(outputTimer);
  outputTimer = setTimeout(buildOutput, 280);
}

const PRESET_TITLES = ['A','B','C','D','Intro','Verse','Chorus','Solos','Riff','Outro'];

function nextAvailableTitle() {
  const usedTitles = new Set(lines.map(l => l.title).filter(Boolean));
  for (const letter of ['A','B','C','D','E','F','G']) {
    if (!usedTitles.has(letter)) return letter;
  }
  return '';
}

// ── Select mode ────────────────────────────────────────────────────────────
let selectMode = false;
let selectedBars = new Set();
let isDragSelecting = false;
let dragSelectOriginKey = null;
let dragStartStates = new Map();

function barKey(li, bi) { return li + ':' + bi; }

function toggleSelectMode() {
  selectMode = !selectMode;
  if (!selectMode) { selectedBars.clear(); updateSelectionUI(); }
  document.getElementById('select-toggle-btn').classList.toggle('active', selectMode);
  document.body.classList.toggle('select-mode', selectMode);
  if (selectMode && document.activeElement && document.activeElement.tagName === 'INPUT') {
    document.activeElement.blur();
  }
  render();
}

function updateSelectionUI() {
  document.querySelectorAll('.bar-input').forEach(inp => {
    inp.classList.toggle('bar-selected', selectedBars.has(inp.dataset.barKey));
  });
  const count = selectedBars.size;
  document.getElementById('select-count').textContent = count;
  document.getElementById('select-actions-wrap').style.display = count > 0 ? '' : 'none';
}

function onBarPointerDown(e, li, bi) {
  if (!selectMode) return;
  e.preventDefault();
  e.stopPropagation();
  const k = barKey(li, bi);
  isDragSelecting = true;
  dragSelectOriginKey = k;
  dragStartStates.clear();
  const wasSelected = selectedBars.has(k);
  dragStartStates.set(k, wasSelected);
  if (wasSelected) selectedBars.delete(k); else selectedBars.add(k);
  updateSelectionUI();
  if (e.pointerId !== undefined) {
    try { e.target.setPointerCapture(e.pointerId); } catch(_) {}
  }
}

function onGlobalPointerUp() {
  if (isDragSelecting) {
    isDragSelecting = false;
    dragSelectOriginKey = null;
    dragStartStates.clear();
  }
}

document.addEventListener('pointerup', onGlobalPointerUp);
document.addEventListener('pointercancel', onGlobalPointerUp);
document.addEventListener('pointermove', e => {
  if (!selectMode || !isDragSelecting) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (el && el.classList.contains('bar-input') && el.dataset.barKey) {
    const k = el.dataset.barKey;
    if (!dragStartStates.has(k)) {
      const originWasSelected = dragStartStates.get(dragSelectOriginKey);
      if (originWasSelected) selectedBars.delete(k); else selectedBars.add(k);
      dragStartStates.set(k, true);
      updateSelectionUI();
    }
  }
});

function showSelectionMenu(e) {
  e.stopPropagation();
  closeMenu();
  const btn = document.getElementById('select-actions-btn');
  const rect = btn.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';
  const menuW = 200;
  let left = rect.right - menuW;
  if (left < 8) left = 8;
  m.style.top = (rect.bottom + 6) + 'px';
  m.style.left = left + 'px';
  [['Copy', actionCopy], ['Paste', actionPaste], ['Clear', actionClear]].forEach(([label, fn]) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.addEventListener('click', () => { closeMenu(); fn(); });
    m.appendChild(b);
  });
  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

function orderedSelectedKeys() {
  const allKeys = [];
  lines.forEach((line, li) => {
    line.bars.forEach((_, bi) => allKeys.push(barKey(li, bi)));
  });
  return allKeys.filter(k => selectedBars.has(k));
}

function getBarValue(k) {
  const [li, bi] = k.split(':').map(Number);
  return lines[li].bars[bi];
}
function setBarValue(k, val) {
  const [li, bi] = k.split(':').map(Number);
  lines[li].bars[bi] = val;
}

let internalClipboard = [];

function actionCopy() {
  const keys = orderedSelectedKeys();
  if (!keys.length) return;
  internalClipboard = keys.map(k => getBarValue(k));
  const text = keys.map(k => formatBarOutput(getBarValue(k))).join('');
  navigator.clipboard.writeText(text).catch(() => {});
  selectedBars.clear();
  updateSelectionUI();
  showToast('Copied ' + keys.length + ' bar' + (keys.length > 1 ? 's' : ''));
}

function actionPaste() {
  const keys = orderedSelectedKeys();
  if (!keys.length) return;
  if (!internalClipboard.length) { showToast('Nothing to paste'); return; }
  keys.forEach((k, i) => setBarValue(k, internalClipboard[i % internalClipboard.length]));
  selectedBars.clear();
  render();
  updateSelectionUI();
  scheduleOutput();
  showToast('Pasted into ' + keys.length + ' bar' + (keys.length > 1 ? 's' : ''));
}

function actionClear() {
  const keys = orderedSelectedKeys();
  if (!keys.length) return;
  keys.forEach(k => setBarValue(k, ''));
  selectedBars.clear();
  render();
  updateSelectionUI();
  scheduleOutput();
  showToast('Cleared ' + keys.length + ' bar' + (keys.length > 1 ? 's' : ''));
}

}

// ── iReal Pro export ───────────────────────────────────────────────────────

// Convert our chord notation to iReal notation
function toIRealChord(raw) {
  if (!raw || raw.trim() === '') return '';
  let s = raw.trim();
  // Strip slash bass temporarily
  let bass = '';
  const slashIdx = s.indexOf('/');
  if (slashIdx !== -1) {
    bass = s.slice(slashIdx);
    s = s.slice(0, slashIdx);
  }
  // Order matters: longer patterns first
  s = s
    .replace(/dim7/gi, 'o7')         // before m replacement
    .replace(/maj7/gi, '^7')         // before m replacement
    .replace(/Δ7/g,    '^7')
    .replace(/ø7/g,    'h7')
    .replace(/m(?!aj|a)/g, '-');     // m -> - but not in maj/ma
  return s + bass;
}

// Apply s/l size tokens per spec:
// s before first chord of a consecutive run
// l before last chord of a consecutive run (on that chord itself, per spec)
function applySL(cells) {
  const n = cells.length;
  const isChord = i => i >= 0 && i < n && cells[i] !== ' ' && cells[i] !== 'x';

  const out = [...cells];
  for (let i = 0; i < n; i++) {
    if (!isChord(i)) continue;
    const prevChord = isChord(i - 1);
    const nextChord = isChord(i + 1);

    if (!prevChord && nextChord) {
      // Start of a run of 2+
      out[i] = 's' + out[i];
    } else if (prevChord && !nextChord) {
      // End of a run of 2+
      out[i] = 'l' + out[i];
    }
    // Middle of run: no prefix
    // Lone chord: no prefix
  }
  return out;
}

// Map our section title to iReal rehearsal mark token
function toIRealSection(title) {
  if (!title) return '';
  const map = { 'A':'*A','B':'*B','C':'*C','D':'*D','Intro':'*i','Verse':'*V' };
  return map[title] || ''; // Chorus, Solos etc have no iReal equivalent — omit
}

// Expand structure string into ordered array of section letter keys
// e.g. "AABA" -> ['A','A','B','A']
function parseStructure(str) {
  if (!str) return null;
  // Match sequences of letters or known multi-char names
  const result = [];
  // Simple: split into individual uppercase letters (works for AABA etc)
  for (const ch of str.toUpperCase()) {
    if (ch >= 'A' && ch <= 'Z') result.push(ch);
  }
  return result.length > 0 ? result : null;
}

// Group lines into sections: each section starts at a titled line,
// subsequent untitled lines belong to that section.
// Returns Array<{ title: string, lineIndices: number[] }>
function groupIntoSections() {
  const sections = [];
  let current = null;
  lines.forEach((line, li) => {
    if (line.title) {
      current = { title: line.title, lineIndices: [li] };
      sections.push(current);
    } else {
      if (current) current.lineIndices.push(li);
      else {
        // Untitled lines before any title — put in a nameless section
        current = { title: '', lineIndices: [li] };
        sections.push(current);
      }
    }
  });
  return sections;
}

// Convert a single bar's raw value to iReal cells string (4 cells, comma-separated)
// prevBarChords: array of iReal chord strings from previous bar (for % resolution)
function barToIRealCells(raw, prevChords) {
  const { openBar, content } = parseBarInput(raw);
  const s = content.trim();

  // Empty or %: simile
  if (!s || s === '%') {
    // Use x token on beat 2
    return { cells: [' ', 'x', ' ', ' '], chords: prevChords };
  }

  const tokens = s.split(/\s+/).filter(Boolean).map(toIRealChord);
  const chords = tokens.filter(Boolean);

  if (chords.length === 0) return { cells: [' ', ' ', ' ', ' '], chords: prevChords };

  let cells = [' ', ' ', ' ', ' '];
  if (chords.length === 1) {
    cells = [chords[0], ' ', ' ', ' '];
  } else if (chords.length === 2) {
    cells = [chords[0], ' ', chords[1], ' '];
  } else if (chords.length === 3) {
    cells = [chords[0], chords[1], chords[2], ' '];
  } else {
    cells = [chords[0], chords[1], chords[2], chords[3]];
  }
  return { cells, chords };
}

function exportIReal() {
  const songTitle  = document.getElementById('m-title').value.trim() || 'Untitled';
  const composerRaw = document.getElementById('m-composer').value.trim();
  const feel       = document.getElementById('m-feel').value.trim();
  const keyRaw     = document.getElementById('m-key').value.trim();
  const structureRaw = document.getElementById('m-structure').value.trim();

  // Composer: iReal wants "Last First"
  // We store it as entered — assume user enters "First Last" or just a name
  // iReal format: Last First. Split on last space.
  let composer = 'Unknown';
  if (composerRaw) {
    const parts = composerRaw.trim().split(/\s+/);
    if (parts.length >= 2) {
      composer = parts[parts.length - 1] + ' ' + parts.slice(0, -1).join(' ');
    } else {
      composer = composerRaw;
    }
  }

  // Style: map our feel to iReal style
  const styleMap = {
    'swing': 'Medium Swing', 'med swing': 'Medium Swing', 'medium swing': 'Medium Swing',
    'fast swing': 'Medium Up Swing', 'up swing': 'Medium Up Swing',
    'ballad': 'Ballad', 'bossa': 'Bossa Nova', 'bossa nova': 'Bossa Nova',
    'latin': 'Latin', 'waltz': 'Jazz Waltz', 'jazz waltz': 'Jazz Waltz',
    'bolero': 'Bolero', 'funk': 'Funk', 'blues': 'Medium Swing',
  };
  const feelKey = feel.toLowerCase();
  const style = styleMap[feelKey] || feel || 'Medium Swing';

  // Normalise key to iReal format
  // Accepts: "E minor", "Em", "E min", "E-", "Bb major", "Bb", "F#m" etc.
  function normaliseKey(raw) {
    if (!raw) return 'C';
    const s = raw.trim();
    // Already in iReal format?
    if (/^[A-G][b#]?-$/.test(s)) return s;
    // Check for minor indicator
    const minorMatch = s.match(/^([A-G][b#]?)\s*(minor|min|m|-)\b/i);
    if (minorMatch) return minorMatch[1] + '-';
    // Major or just a note name
    const majorMatch = s.match(/^([A-G][b#]?)/);
    if (majorMatch) return majorMatch[1];
    return 'C';
  }
  const key = normaliseKey(keyRaw);

  // Build section map
  const sectionGroups = groupIntoSections();
  // Map section title -> section group (use first occurrence for each title)
  const sectionMap = new Map();
  const seenTitles = new Map(); // title -> count
  sectionGroups.forEach(sec => {
    const t = sec.title;
    const count = (seenTitles.get(t) || 0);
    seenTitles.set(t, count + 1);
    // Key: title_occurrence (so A_0, A_1 etc.)
    sectionMap.set(t + '_' + count, sec);
    if (!sectionMap.has(t)) sectionMap.set(t, sec); // first occurrence also keyed by title alone
  });

  // Determine ordered sequence of sections
  // Parse structure field; if absent, use the order of sections as they appear
  const structureParsed = parseStructure(structureRaw);

  let orderedSectionTitles; // array of title strings in play order
  let repeatMap = null; // Map<title_idx, {open,close}>

  if (structureParsed) {
    // Count unique titles in chart vs structure
    const chartTitles = [...new Set(sectionGroups.map(s => s.title).filter(Boolean))];
    const structureTitles = [...new Set(structureParsed)];

    // Detect the abbreviated case: e.g. chart has A,B but structure is AABA
    // Strategy: if structure has repeated letters but chart only has each once,
    // we need to add repeat signs to sections that are played >1 consecutive time,
    // or just expand them inline.
    // Simple approach: expand structure fully — repeat sections as needed.
    // For sections that appear multiple times consecutively in structure, add { } repeats.

    // Build the ordered play sequence, collapsing consecutive runs into
    // single repeat-bracketed entries, expanding non-consecutive repeats inline.
    // Each entry: { title, openRepeat, closeRepeat }
    const playSequence = [];
    let i = 0;
    while (i < structureParsed.length) {
      const title = structureParsed[i];
      let run = 1;
      while (i + run < structureParsed.length && structureParsed[i + run] === title) run++;
      if (run >= 2) {
        playSequence.push({ title, openRepeat: true, closeRepeat: true });
      } else {
        playSequence.push({ title, openRepeat: false, closeRepeat: false });
      }
      i += run;
    }

    orderedSectionTitles = playSequence;

  } else {
    // No structure: just use sections in order, each once, no repeats
    orderedSectionTitles = sectionGroups.map(s => ({
      title: s.title || '',
      openRepeat: false,
      closeRepeat: false,
    }));
  }

  // Build chord block
  let block = '';
  let isFirstSec = true;
  let prevChords = [];

  // Resolve a title to its section group (always uses first occurrence in chart)
  function resolveSection(title) {
    return sectionMap.get(title) || sectionMap.get(title + '_0');
  }

  orderedSectionTitles.forEach((entry, secIdx) => {
    const title = entry.title;
    const sec = resolveSection(title);
    if (!sec) return;

    // Collect all bars
    const allBars = [];
    sec.lineIndices.forEach(li => {
      lines[li].bars.forEach(raw => allBars.push(raw));
    });
    if (!allBars.length) return;

    const rehearsalMark = toIRealSection(title);
    const isLastSec = secIdx === orderedSectionTitles.length - 1;

    const firstBarRaw = allBars[0];
    const lastBarRaw  = allBars[allBars.length - 1];
    const { openBar: userFirstOpen } = parseBarInput(firstBarRaw);
    const { closeBar: userLastClose } = parseBarInput(lastBarRaw);

    const useOpenRepeat  = (entry.openRepeat)  || userFirstOpen === '|:';
    const useCloseRepeat = (entry.closeRepeat) || userLastClose === ':|';

    allBars.forEach((raw, bi) => {
      const isFirstBar = bi === 0;
      const isLastBar  = bi === allBars.length - 1;
      const { openBar: userOpen, closeBar: userClose } = parseBarInput(raw);

      let openBl = '';
      if (isFirstBar) {
        let bl = useOpenRepeat ? '{' : '[';
        openBl = rehearsalMark + bl;
        isFirstSec = false;
      } else if (userOpen === '|:') {
        openBl = '{';
      }

      let closeBl = '|';
      if (isLastBar) {
        if (useCloseRepeat) closeBl = '}';
        else if (isLastSec) closeBl = 'Z';
        else closeBl = ']';
      } else if (userClose === ':|') {
        closeBl = '}';
      }

      const { cells, chords: newChords } = barToIRealCells(raw, prevChords);
      if (newChords.length > 0) prevChords = newChords;

      // Apply s/l tokens to cells
      const styledCells = applySL([...cells]);
      block += openBl + styledCells.join(',') + closeBl;
    });
  });

  // Build URL — field delimiters and chord block must NOT be percent-encoded
  // Only encode the human-readable fields (title, composer, style, key)
  function esc(s) { return encodeURIComponent(s).replace(/%23/g,'#').replace(/%2F/g,'/'); }
  const url = 'irealbook://' +
    esc(songTitle) + '=' +
    esc(composer)  + '=' +
    esc(style)     + '=' +
    esc(key)       + '=n=' +
    block;

  console.log('iReal URL:', url);
  // Open via anchor click — location.href rejects custom schemes in most browsers
  const a = document.createElement('a');
  a.href = url;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('Opening in iReal Pro…');
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const area = document.getElementById('lines-area');
  area.innerHTML = '';

  lines.forEach((line, li) => {
    const block = document.createElement('div');
    block.className = 'line-block';

    // Title row (only if line has a section title)
    if (line.title) {
      const titleRow = document.createElement('div');
      titleRow.className = 'title-row';

      const titleBtn = document.createElement('button');
      titleBtn.className = 'section-title-btn';
      titleBtn.textContent = '¶ ' + line.title;
      titleBtn.setAttribute('tabindex', '-1');
      titleBtn.addEventListener('click', e => { e.stopPropagation(); showTitleMenu(e, li); });

      const removeBtn = document.createElement('button');
      removeBtn.className = 'section-title-remove-btn';
      removeBtn.setAttribute('tabindex', '-1');
      removeBtn.setAttribute('title', 'Remove section title');
      removeBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      removeBtn.addEventListener('click', e => {
        e.stopPropagation();
        lines[li].title = '';
        render();
      });

      titleRow.appendChild(titleBtn);
      titleRow.appendChild(removeBtn);
      block.appendChild(titleRow);
    }

    // Bar row
    const barRow = document.createElement('div');
    barRow.className = 'bar-row';

    // Left gutter
    const gutter = document.createElement('div');
    gutter.className = 'line-gutter';
    if (!line.title) {
      const addTitleBtn = document.createElement('button');
      addTitleBtn.className = 'add-title-btn';
      addTitleBtn.setAttribute('tabindex', '-1');
      addTitleBtn.setAttribute('title', 'Add section title');
      addTitleBtn.textContent = '¶';
      addTitleBtn.addEventListener('click', e => {
        e.stopPropagation();
        lines[li].title = nextAvailableTitle();
        render();
      });
      gutter.appendChild(addTitleBtn);
    }
    barRow.appendChild(gutter);

    // Bars outer wrap
    const outerWrap = document.createElement('div');
    outerWrap.style.cssText = 'display:flex;align-items:stretch;flex:1;min-width:0;border:0.5px solid var(--border);border-right:none;border-radius:6px 0 0 6px;overflow:hidden';

    const barsContainer = document.createElement('div');
    barsContainer.className = 'bars-container';

    line.bars.forEach((val, bi) => {
      const inp = document.createElement('input');
      inp.className = 'bar-input';
      inp.value = val;
      inp.dataset.barKey = barKey(li, bi);
      inp.setAttribute('autocomplete', 'off');
      inp.setAttribute('autocorrect', 'off');
      inp.setAttribute('autocapitalize', 'words');
      inp.setAttribute('spellcheck', 'false');
      if (selectMode) {
        inp.setAttribute('readonly', 'true');
        inp.classList.toggle('bar-selected', selectedBars.has(barKey(li, bi)));
        inp.addEventListener('pointerdown', e => onBarPointerDown(e, li, bi));
      } else {
        inp.addEventListener('input', e => {
          lines[li].bars[bi] = e.target.value;
          scheduleOutput();
        });
      }
      barsContainer.appendChild(inp);
      const sep = document.createElement('div');
      sep.className = 'bar-sep';
      barsContainer.appendChild(sep);
    });

    outerWrap.appendChild(barsContainer);

    const lineOptBtn = document.createElement('button');
    lineOptBtn.className = 'line-options-btn';
    lineOptBtn.setAttribute('tabindex', '-1');
    lineOptBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>`;
    lineOptBtn.addEventListener('click', e => { e.stopPropagation(); showLineMenu(e, li); });

    barRow.appendChild(outerWrap);
    barRow.appendChild(lineOptBtn);
    block.appendChild(barRow);
    area.appendChild(block);
  });

  buildOutput();
}

// ── Title picker menu ──────────────────────────────────────────────────────
function showTitleMenu(e, li) {
  closeMenu();
  const rect = e.currentTarget.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';
  m.style.minWidth = '160px';

  let left = rect.left;
  const menuW = 170;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  if (left < 8) left = 8;
  m.style.top  = (rect.bottom + 4) + 'px';
  m.style.left = left + 'px';

  const current = lines[li].title;

  PRESET_TITLES.forEach(label => {
    const btn = document.createElement('button');
    btn.textContent = label;
    if (current === label) btn.classList.add('active');
    btn.addEventListener('click', () => {
      lines[li].title = label;
      closeMenu();
      render();
    });
    m.appendChild(btn);
  });

  const div = document.createElement('div');
  div.className = 'menu-divider';
  m.appendChild(div);

  const customBtn = document.createElement('button');
  customBtn.textContent = 'Custom…';
  const isCustom = current !== '' && !PRESET_TITLES.slice(1).includes(current);
  if (isCustom) customBtn.classList.add('active');

  const customInput = document.createElement('input');
  customInput.className = 'menu-custom-input';
  customInput.placeholder = 'Custom name…';
  customInput.value = isCustom ? current : '';
  customInput.setAttribute('autocapitalize', 'words');
  customInput.setAttribute('autocorrect', 'off');
  customInput.setAttribute('spellcheck', 'false');

  function commitCustom() {
    const val = customInput.value.trim();
    if (val) lines[li].title = val;
    closeMenu();
    render();
  }

  customBtn.addEventListener('click', e => {
    e.stopPropagation();
    customBtn.style.display = 'none';
    customInput.style.display = 'block';
    customInput.focus();
    customInput.select();
  });
  customInput.addEventListener('click', e => e.stopPropagation());
  customInput.addEventListener('keydown', ev => {
    if (ev.key === 'Enter')  { ev.preventDefault(); commitCustom(); }
    if (ev.key === 'Escape') { closeMenu(); }
  });
  customInput.addEventListener('blur', () => setTimeout(commitCustom, 150));

  m.appendChild(customBtn);
  m.appendChild(customInput);
  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

// ── Line options menu ──────────────────────────────────────────────────────
function showLineMenu(e, li) {
  closeMenu();
  const rect = e.currentTarget.getBoundingClientRect();
  const m = document.createElement('div');
  m.className = 'menu-overlay';

  const menuW = 210;
  let left = rect.right - menuW;
  if (left < 8) left = 8;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  m.style.top  = (rect.bottom + 6) + 'px';
  m.style.left = left + 'px';

  const actions = [
    ['Add bar', () => { lines[li].bars.push(''); render(); }],
    ['Remove empty bars', () => {
      const filtered = lines[li].bars.filter(b => {
        const { content } = parseBarInput(b);
        return content !== '' && content !== '%';
      });
      lines[li].bars = filtered.length > 0 ? filtered : [''];
      render();
    }],
    ['Clear line', () => {
      lines[li].bars = lines[li].bars.map(() => '');
      render();
    }],
    ['—'],
    ['Move line up', () => {
      if (li > 0) { [lines[li-1], lines[li]] = [lines[li], lines[li-1]]; render(); }
    }],
    ['Move line down', () => {
      if (li < lines.length - 1) { [lines[li], lines[li+1]] = [lines[li+1], lines[li]]; render(); }
    }],
    ['—'],
    ['Add line above', () => { lines.splice(li, 0, { title: '', bars: ['','','',''] }); render(); }],
    ['Add line below', () => { lines.splice(li+1, 0, { title: '', bars: ['','','',''] }); render(); }],
    ['—'],
    ['Delete line', () => {
      if (lines.length > 1) { lines.splice(li, 1); render(); }
    }, 'danger'],
  ];

  actions.forEach(([label, fn, cls]) => {
    if (label === '—') {
      const d = document.createElement('div');
      d.className = 'menu-divider';
      m.appendChild(d);
      return;
    }
    const btn = document.createElement('button');
    btn.textContent = label;
    if (cls) btn.className = cls;
    btn.addEventListener('click', () => { closeMenu(); fn(); });
    m.appendChild(btn);
  });

  m.style.pointerEvents = 'all';
  document.getElementById('menu-portal').appendChild(m);
  menuState = m;
}

function closeMenu() {
  if (menuState) { menuState.remove(); menuState = null; }
}
document.addEventListener('click', closeMenu);

function addLine() {
  lines.push({ title: '', bars: ['','','',''] });
  render();
}

// ── Toast & copy output ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').textContent)
    .then(() => showToast('Copied to clipboard'))
    .catch(() => showToast('Copy failed'));
}

// ── Import functionality ───────────────────────────────────────────────────
function hasExistingData() {
  const title = document.getElementById('m-title').value.trim();
  const composer = document.getElementById('m-composer').value.trim();
  const feel = document.getElementById('m-feel').value.trim();
  const key = document.getElementById('m-key').value.trim();
  const structure = document.getElementById('m-structure').value.trim();
  
  const hasMetaData = title || composer || feel || key || structure;
  const hasBarData = lines.some(line => line.bars.some(bar => bar.trim() !== ''));
  
  return hasMetaData || hasBarData;
}

function openImportModal() {
  const backdrop = document.getElementById('import-modal-backdrop');
  const textarea = document.getElementById('import-textarea');
  const warning = document.getElementById('import-warning');
  
  backdrop.classList.add('active');
  textarea.value = '';
  textarea.focus();
  
  if (hasExistingData()) {
    warning.innerHTML = '<strong>Warning:</strong> Importing will replace all existing data.';
    warning.classList.add('import-warning');
  } else {
    warning.innerHTML = '';
    warning.classList.remove('import-warning');
  }
}

function closeImportModal() {
  const backdrop = document.getElementById('import-modal-backdrop');
  backdrop.classList.remove('active');
}

function parseChordChart(text) {
  const lines_text = text.split('\n');
  let idx = 0;
  
  // Parse header
  let title = '';
  let composer = '';
  let feel = '';
  let key = '';
  let structure = '';
  
  // Check first line for title (with optional composer)
  if (idx < lines_text.length && lines_text[idx].trim() !== '' && !lines_text[idx].trim().startsWith('[')) {
    const firstLine = lines_text[idx].trim();
    const composerMatch = firstLine.match(/^(.*?)\s*\((.*?)\)\s*$/);
    if (composerMatch) {
      title = composerMatch[1].trim();
      composer = composerMatch[2].trim();
    } else {
      title = firstLine;
    }
    idx++;
  }
  
  // Check second line for Feel/Key
  if (idx < lines_text.length && lines_text[idx].trim() !== '' && !lines_text[idx].trim().startsWith('[')) {
    const secondLine = lines_text[idx].trim();
    
    // Extract key using regex: (A-G)(b#)? (major|minor)
    const keyMatch = secondLine.match(/([A-G]#?b?)\s+(major|minor)/i);
    if (keyMatch) {
      key = keyMatch[0];
      // Remove the key from the line to get feel
      let remaining = secondLine.replace(keyMatch[0], '').trim();
      // Remove comma and space if present
      feel = remaining.replace(/,\s*$/, '').trim();
    } else {
      // If no key pattern found, split on comma
      const parts = secondLine.split(',');
      feel = parts[0].trim();
      if (parts.length > 1) {
        key = parts[1].trim();
      }
    }
    idx++;
  }
  
  // Check third line for Structure
  if (idx < lines_text.length && lines_text[idx].trim() !== '' && !lines_text[idx].trim().startsWith('[')) {
    structure = lines_text[idx].trim();
    idx++;
  }
  
  // Parse bars and sections
  const newLines = [];
  let currentTitle = '';
  
  while (idx < lines_text.length) {
    const line = lines_text[idx];
    idx++;
    
    // Check for section header
    if (line.trim().match(/^\[.*\]$/)) {
      currentTitle = line.trim().slice(1, -1); // Remove brackets
      continue;
    }
    
    // Empty line or whitespace-only line
    if (line.trim() === '') {
      continue;
    }
    
    // Parse bar line
    const bars = parseBarLine(line);
    if (bars.length > 0) {
      newLines.push({ title: currentTitle, bars: bars });
      currentTitle = ''; // Only apply title to first line after section header
    }
  }
  
  // If no bars were found, create at least one empty line
  if (newLines.length === 0) {
    newLines.push({ title: '', bars: [''] });
  }
  
  return {
    title,
    composer,
    feel,
    key,
    structure,
    lines: newLines
  };
}

function parseBarLine(line) {
  const bars = [];
  let currentBar = '';
  let i = 0;
  
  while (i < line.length) {
    const char = line[i];
    
    // Check for repeat symbols
    if (char === '|' || char === ':') {
      // Check for special barline markers
      if (char === ':' && i > 0 && line[i-1] === '|') {
        // This is :| so we skip it (already handled)
        i++;
        continue;
      }
      if (char === '|' && i + 1 < line.length && line[i+1] === ':') {
        // This is |: start of repeat
        if (currentBar.trim()) {
          bars.push(currentBar.trim());
          currentBar = '';
        }
        i += 2;
        continue;
      }
      if (char === ':' && i > 0 && line[i-1] === '|') {
        // This is :| end of repeat
        if (currentBar.trim()) {
          bars.push(currentBar.trim());
          currentBar = '';
        }
        i++;
        continue;
      }
      
      // Regular bar line
      if (currentBar.trim()) {
        bars.push(currentBar.trim());
        currentBar = '';
      }
      i++;
      continue;
    }
    
    // Add character to current bar (up to 8 chars per bar + barline)
    if (currentBar.length < 8) {
      currentBar += char;
    }
    i++;
  }
  
  // Add final bar if exists
  if (currentBar.trim()) {
    bars.push(currentBar.trim());
  }
  
  return bars;
}

function performImport() {
  const textarea = document.getElementById('import-textarea');
  const text = textarea.value.trim();
  
  if (!text) {
    showToast('Please paste a chord chart');
    return;
  }
  
  try {
    const parsed = parseChordChart(text);
    
    // Clear all existing data
    document.getElementById('m-title').value = parsed.title;
    document.getElementById('m-composer').value = parsed.composer;
    document.getElementById('m-feel').value = parsed.feel;
    document.getElementById('m-key').value = parsed.key;
    document.getElementById('m-structure').value = parsed.structure;
    
    lines = parsed.lines;
    
    closeImportModal();
    render();
    showToast('Imported successfully');
  } catch (err) {
    console.error('Import error:', err);
    showToast('Error importing chart');
  }
}

// Menu button and modal event listeners
document.getElementById('menu-btn').addEventListener('click', openImportModal);
document.getElementById('import-cancel-btn').addEventListener('click', closeImportModal);
document.getElementById('import-submit-btn').addEventListener('click', performImport);

// Close modal on backdrop click
document.getElementById('import-modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'import-modal-backdrop') {
    closeImportModal();
  }
});

// Close on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('import-modal-backdrop').classList.contains('active')) {
    closeImportModal();
  }
});

['m-title','m-composer','m-feel','m-key','m-structure'].forEach(id => {
  document.getElementById(id).addEventListener('input', scheduleOutput);
});

// Hide pills when key input is focused; restore on blur
const keyInput = document.getElementById('m-key');
keyInput.addEventListener('focus', () => updateKeyPills());
keyInput.addEventListener('blur',  () => setTimeout(updateKeyPills, 50));
keyInput.addEventListener('input', () => updateKeyPills());

render();
</script>
